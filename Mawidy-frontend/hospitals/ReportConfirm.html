@{
    ViewData["Title"] = "Report Submitted";
    Layout = null;
}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Submitted — Maw3dyCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

    <script>
        (function() {
            var saved = localStorage.getItem('maw3dy-theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>

    <style>
        :root {
            --bg-main: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color .3s, color .3s, border-color .3s;
        }

        body {
            min-height: 100vh;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI',sans-serif;
        }

        /* Navbar */
        .main-navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-brand-icon {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
        }

        .nav-brand-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            transition: all .2s;
        }

            .theme-toggle:hover {
                border-color: #3b82f6;
                color: #3b82f6;
                transform: rotate(15deg);
            }

        /* Content */
        .content-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Confirm Box */
        .confirm-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,.1);
            text-align: center;
        }

        .done-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #f0fdf4;
            color: #16a34a;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .conf-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .conf-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .btn-home {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: background .2s;
        }

            .btn-home:hover {
                background: #2563eb;
                color: white;
            }
    </style>
</head>
<body>

    <nav class="main-navbar">
        <a href="/Maw3dyCare/Landing" class="nav-brand">
            <div class="nav-brand-icon">M</div>
            <span class="nav-brand-text">Maw3dyCare</span>
        </a>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </nav>

    <div class="content-center">
        <div class="confirm-box">
            <div class="done-icon"><i class="fas fa-check"></i></div>
            <div class="conf-title">Report Submitted!</div>
            <div class="conf-sub">
                Thank you for your feedback. Our team will review your report
                and take the necessary actions.
            </div>
            <a href="/Maw3dyCare/Hospitals" class="btn-home">
                <i class="fas fa-home"></i> Back to Hospitals
            </a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('maw3dy-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('maw3dy-theme', 'dark');
            }
        }
        (function() {
            var saved = localStorage.getItem('maw3dy-theme');
            var icon  = document.getElementById('themeIcon');
            if (saved === 'dark' && icon) icon.className = 'fas fa-sun';
        })();
    </script>
</body>
</html>

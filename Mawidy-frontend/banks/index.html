<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mawidy - Booking Portal</title>
    <!-- Tailwind stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col bg-background text-foreground antialiased font-sans">
    
    <!-- Navbar -->
    <header class="sticky top-0 z-40 w-full border-b border-border/60 glass">
        <div class="container mx-auto px-4 md:px-8 flex h-16 items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="relative inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-accent shadow-glow">
                    <svg viewBox="0 0 24 24" class="relative h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18"></path>
                        <path d="M5 21V10l7-5 7 5v11"></path>
                        <path d="M9 21v-7h6v7"></path>
                    </svg>
                </span>
                <span class="font-semibold tracking-tight text-base text-foreground" data-translate="common.appName">موعدي</span>
            </a>

            <!-- Nav Elements -->
            <nav class="flex items-center gap-2">
                <!-- Language Toggle -->
                <button onclick="toggleLang()" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-muted text-muted-foreground hover:text-foreground">
                    <i data-lucide="languages" class="h-4 w-4"></i>
                    <span id="langBtnText">English</span>
                </button>

                <a href="my-appointments.html" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-muted text-muted-foreground hover:text-foreground">
                    <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
                    <span data-translate="common.dashboard">لوحة التحكم</span>
                </a>

                <a href="admin/dashboard.html" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition-colors hover:bg-muted text-muted-foreground hover:text-foreground text-accent">
                    <i data-lucide="shield" class="h-4 w-4"></i>
                    <span data-translate="employee.portal">بوابة الموظفين</span>
                </a>

                <a href="appointments.html" class="inline-flex items-center gap-2 px-3 py-1.5 bg-gradient-accent hover:opacity-95 text-white rounded-xl text-sm font-medium transition-all shadow-soft">
                    <i data-lucide="plus" class="h-4 w-4"></i>
                    <span data-translate="common.bookAppointment">احجز موعداً</span>
                </a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1">
        <!-- Hero Section -->
        <section class="relative overflow-hidden border-b border-border/40 py-20 md:py-32">
            <div class="absolute inset-0 bg-gradient-mesh pointer-events-none opacity-40"></div>
            <div class="container mx-auto px-4 md:px-8 relative z-10 text-center">
                <div class="inline-flex items-center gap-2 rounded-full border border-border/85 bg-card/90 px-3.5 py-1.5 text-xs font-medium text-muted-foreground shadow-soft mb-6">
                    <i data-lucide="sparkles" class="h-3.5 w-3.5 text-accent animate-pulse"></i>
                    <span data-translate="common.secureNote">حجز فوري ومؤمن بالكامل</span>
                </div>
                
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-foreground leading-tight max-w-4xl mx-auto" data-translate="hero.title">
                    احجز موعدك الطبي بكل سهولة وأمان
                </h1>
                
                <p class="mt-6 text-lg text-muted-foreground max-w-2xl mx-auto" data-translate="hero.subtitle">
                    خطوتك الأولى نحو رعاية صحية متكاملة. احجز موعدك الآن مع أفضل الأطباء في فروعنا المتميزة.
                </p>
                
                <div class="mt-10 flex flex-wrap items-center justify-center gap-4">
                    <a href="appointments.html" class="inline-flex items-center justify-center gap-2 h-12 px-8 rounded-xl bg-gradient-accent hover:opacity-95 text-white font-medium shadow-glow transition-all">
                        <span data-translate="hero.cta">احجز موعدك الآن</span>
                        <i data-lucide="calendar" class="h-4.5 w-4.5"></i>
                    </a>
                    
                </div>
            </div>
        </section>

        
    </main>

    <!-- Footer -->
    <footer class="border-t border-border/60 py-8 bg-card text-center text-xs text-muted-foreground">
        © 2026 موعدي - Mw3dy · جميع الحقوق محفوظة
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script>
        function toggleLang() {
            const nextLang = currentLanguage === 'ar' ? 'en' : 'ar';
            setLanguage(nextLang);
            document.getElementById('langBtnText').innerText = nextLang === 'ar' ? 'English' : 'العربية';
        }

        &role=${role}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
            
            // Redirect to backend helper to trigger cookie write and redirect
            window.location.href = testUrl;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('langBtnText').innerText = currentLanguage === 'ar' ? 'English' : 'العربية';
        });
    </script>
</body>
</html>

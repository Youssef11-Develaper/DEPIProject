<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المحاكم والقضايا - لوحة التحكم v2</title>
    <!-- CSS Links -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin-v2/css/admin.css">
    <style>
        .tabs-header {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: var(--primary);
            background: rgba(46, 134, 193, 0.05);
        }
        .tab-btn.active {
            color: white;
            background: var(--primary);
        }
        .court-grid, .case-grid, .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .court-card, .case-card, .dept-card {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .court-card:hover, .case-card:hover, .dept-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-badge.open { background: #E8F8F5; color: #27AE60; }
        .status-badge.busy { background: #FEF9E7; color: #F39C12; }
        .status-badge.closed { background: #FDEDEC; color: #C0392B; }
        
        .table-responsive {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            margin-bottom: 30px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        .admin-table th {
            background: #F8F9F9;
            color: var(--text-color);
            font-weight: 700;
            padding: 15px 20px;
            border-bottom: 2px solid var(--border-color);
            font-size: 0.85rem;
        }
        .admin-table td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }
        .admin-table tr:last-child td {
            border-bottom: none;
        }
        .admin-table tr:hover td {
            background: #FDFEFE;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar Injected Here -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
        <!-- Header Injected Here -->
        <header id="header-container" class="admin-header"></header>
        
        <main class="page-content">
            <div class="page-title-area">
                <div>
                    <h1 class="page-title">إدارة المحاكم والنزاعات القضائية</h1>
                    <ul class="breadcrumb">
                        <li><a href="/admin-v2/index.html">الرئيسية</a></li>
                        <li>المحاكم والقضايا</li>
                    </ul>
                </div>
                <div>
                    <button class="admin-btn admin-btn-primary" id="add-new-btn" onclick="openAddModal()">
                        <i class="bi bi-plus-circle"></i> إضافة محكمة جديدة
                    </button>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="tabs-header">
                <button class="tab-btn active" id="tab-courts-btn" onclick="switchSection('courts')">
                    <i class="bi bi-bank"></i> المحاكم والدوائر
                </button>
                <button class="tab-btn" id="tab-services-btn" onclick="switchSection('services')">
                    <i class="bi bi-journal-check"></i> الخدمات القضائية
                </button>
                <button class="tab-btn" id="tab-cases-btn" onclick="switchSection('cases')">
                    <i class="bi bi-file-earmark-gavel"></i> القضايا والنزاعات
                </button>
                <button class="tab-btn" id="tab-bookings-btn" onclick="switchSection('bookings')">
                    <i class="bi bi-calendar-event"></i> مواعيد الجلسات والحجوزات
                </button>
            </div>

            <!-- SECTION 1: COURTS -->
            <div class="tab-section" id="section-courts">
                <div class="filter-bar">
                    <div class="filter-group" style="flex: 2;">
                        <label class="admin-form-label">بحث باسم المحكمة أو عنوانها</label>
                        <input type="text" id="search-court" class="admin-form-control" placeholder="ابحث باسم المحكمة..." oninput="renderCourts()">
                    </div>
                </div>
                <div class="court-grid" id="courts-container">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- SECTION 2: SERVICES -->
            <div class="tab-section" id="section-services" style="display:none;">
                <div class="court-grid" id="services-container">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- SECTION 3: CASES -->
            <div class="tab-section" id="section-cases" style="display:none;">
                <div class="case-grid" id="cases-container">
                    <!-- Loaded dynamically -->
                </div>
            </div>

            <!-- SECTION 4: BOOKINGS -->
            <div class="tab-section" id="section-bookings" style="display:none;">
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>صاحب الحجز</th>
                                <th>الرقم القومي</th>
                                <th>المحكمة</th>
                                <th>الدائرة / الخدمة</th>
                                <th>رقم القضية</th>
                                <th>تاريخ الحجز</th>
                                <th>الوقت</th>
                                <th>رقم الدور</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-table-body">
                            <!-- Loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Add/Edit Court Modal -->
<div class="modal-backdrop" id="court-modal">
    <div class="admin-modal" style="max-width: 550px;">
        <div class="admin-modal-header">
            <span class="admin-modal-title" id="court-modal-title">إضافة محكمة جديدة</span>
            <button class="admin-modal-close" onclick="closeCourtModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <input type="hidden" id="court-id">
            
            <div class="admin-form-group">
                <label class="admin-form-label">اسم المحكمة</label>
                <input type="text" id="court-name" class="admin-form-control" placeholder="مثال: محكمة شمال القاهرة الابتدائية">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="admin-form-group">
                    <label class="admin-form-label">نوع المحكمة</label>
                    <select id="court-type" class="admin-form-control">
                        <option value="Civil">مدنية</option>
                        <option value="Criminal">جنائية</option>
                        <option value="Family">أسرة</option>
                        <option value="Commercial">تجارية</option>
                        <option value="Appeal">استئناف</option>
                    </select>
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label">الهاتف</label>
                    <input type="text" id="court-phone" class="admin-form-control" placeholder="هاتف المحكمة">
                </div>
            </div>
            
            <div class="admin-form-group">
                <label class="admin-form-label">العنوان</label>
                <input type="text" id="court-address" class="admin-form-control" placeholder="العنوان بالتفصيل">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="admin-form-group">
                    <label class="admin-form-label">عدد القاعات</label>
                    <input type="number" id="court-rooms" class="admin-form-control" min="1" value="10">
                </div>
                <div class="admin-form-group" style="display: flex; align-items: center; padding-top: 25px;">
                    <label class="admin-form-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="court-active" checked style="width: 18px; height: 18px;"> محكمة نشطة
                    </label>
                </div>
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn admin-btn-outline" onclick="closeCourtModal()">إلغاء</button>
            <button class="admin-btn admin-btn-primary" onclick="saveCourt()">حفظ المحكمة</button>
        </div>
    </div>
</div>

<!-- Add Department Modal -->
<div class="modal-backdrop" id="dept-modal">
    <div class="admin-modal" style="max-width: 450px;">
        <div class="admin-modal-header">
            <span class="admin-modal-title">إضافة دائرة قضائية</span>
            <button class="admin-modal-close" onclick="closeDeptModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <input type="hidden" id="dept-court-id">
            <div class="admin-form-group">
                <label class="admin-form-label">المحكمة</label>
                <input type="text" id="dept-court-name" class="admin-form-control" readonly>
            </div>
            <div class="admin-form-group">
                <label class="admin-form-label">اسم الدائرة</label>
                <input type="text" id="dept-name" class="admin-form-control" placeholder="مثال: الدائرة الأولى مدني كلي">
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn admin-btn-outline" onclick="closeDeptModal()">إلغاء</button>
            <button class="admin-btn admin-btn-primary" onclick="saveDept()">إضافة الدائرة</button>
        </div>
    </div>
</div>

<!-- Add Service Modal -->
<div class="modal-backdrop" id="service-modal">
    <div class="admin-modal" style="max-width: 500px;">
        <div class="admin-modal-header">
            <span class="admin-modal-title">إضافة خدمة قضائية جديدة</span>
            <button class="admin-modal-close" onclick="closeServiceModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <div class="admin-form-group">
                <label class="admin-form-label">اسم الخدمة</label>
                <input type="text" id="service-name" class="admin-form-control" placeholder="مثال: استخراج حكم محكمة">
            </div>
            <div class="admin-form-group">
                <label class="admin-form-label">الوصف</label>
                <textarea id="service-desc" class="admin-form-control" rows="3" placeholder="وصف الخدمة القضائية..."></textarea>
            </div>
            <div class="admin-form-group">
                <label class="admin-form-label">الوقت التقديري للتقديم (بالدقائق)</label>
                <input type="number" id="service-time" class="admin-form-control" value="30">
            </div>
            <div class="admin-form-group">
                <label class="admin-form-label">المستندات المطلوبة (تنسيق JSON)</label>
                <textarea id="service-docs" class="admin-form-control" rows="3">["بطاقة الرقم القومي سارية","ملف الدعوى"]</textarea>
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn admin-btn-outline" onclick="closeServiceModal()">إلغاء</button>
            <button class="admin-btn admin-btn-primary" onclick="saveService()">حفظ الخدمة</button>
        </div>
    </div>
</div>

<!-- Add Case Modal -->
<div class="modal-backdrop" id="case-modal">
    <div class="admin-modal" style="max-width: 550px;">
        <div class="admin-modal-header">
            <span class="admin-modal-title">إضافة قضية جديدة للنظام</span>
            <button class="admin-modal-close" onclick="closeCaseModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <div class="admin-form-group">
                <label class="admin-form-label">رقم القضية</label>
                <input type="text" id="case-number" class="admin-form-control" placeholder="مثال: 2025/4821">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="admin-form-group">
                    <label class="admin-form-label">السنة</label>
                    <input type="number" id="case-year" class="admin-form-control" value="2025">
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label">نوع القضية</label>
                    <input type="text" id="case-type" class="admin-form-control" placeholder="دعوى مدنية / جنائية">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="admin-form-group">
                    <label class="admin-form-label">المحكمة</label>
                    <select id="case-court" class="admin-form-control" onchange="loadCaseDepts()"></select>
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label">الدائرة</label>
                    <select id="case-dept" class="admin-form-control"></select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="admin-form-group">
                    <label class="admin-form-label">المدعي</label>
                    <input type="text" id="case-plaintiff" class="admin-form-control" placeholder="اسم المدعي">
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label">المدعى عليه</label>
                    <input type="text" id="case-defendant" class="admin-form-control" placeholder="اسم المدعى عليه">
                </div>
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label">حالة القضية</label>
                <select id="case-status" class="admin-form-control">
                    <option value="نشط">نشط</option>
                    <option value="مؤجل">مؤجل</option>
                    <option value="محكوم">محكوم</option>
                    <option value="شطب">شطب</option>
                </select>
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn admin-btn-outline" onclick="closeCaseModal()">إلغاء</button>
            <button class="admin-btn admin-btn-primary" onclick="saveCase()">حفظ القضية</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>

<script>
    let allCourts = [];
    let allServices = [];
    let allCases = [];
    let allBookings = [];
    let activeSection = 'courts';

    document.addEventListener('DOMContentLoaded', async () => {
        AdminUI.init('courts');
        await loadSectionData();
    });

    async function loadSectionData() {
        try {
            if (activeSection === 'courts') {
                const res = await API.adminv2.getCourtsList();
                allCourts = res.data || [];
                renderCourts();
            } else if (activeSection === 'services') {
                const res = await API.adminv2.getCourtServices();
                allServices = res.data || [];
                renderServices();
            } else if (activeSection === 'cases') {
                const res = await API.adminv2.getLegalCases();
                allCases = res.data || [];
                renderCases();
            } else if (activeSection === 'bookings') {
                const res = await API.adminv2.getCourtBookings();
                allBookings = res.data || [];
                renderBookings();
            }
        } catch (err) {
            console.error(err);
            AdminUI.showToast('حدث خطأ أثناء تحميل البيانات', 'error');
        }
    }

    function switchSection(sec) {
        activeSection = sec;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${sec}-btn`).classList.add('active');

        document.querySelectorAll('.tab-section').forEach(s => s.style.display = 'none');
        document.getElementById(`section-${sec}`).style.display = 'block';

        // Update add new button label and target
        const addBtn = document.getElementById('add-new-btn');
        if (sec === 'courts') {
            addBtn.style.display = 'inline-flex';
            addBtn.innerHTML = '<i class="bi bi-plus-circle"></i> إضافة محكمة جديدة';
            addBtn.onclick = openAddModal;
        } else if (sec === 'services') {
            addBtn.style.display = 'inline-flex';
            addBtn.innerHTML = '<i class="bi bi-plus-circle"></i> إضافة خدمة قضائية';
            addBtn.onclick = openAddServiceModal;
        } else if (sec === 'cases') {
            addBtn.style.display = 'inline-flex';
            addBtn.innerHTML = '<i class="bi bi-plus-circle"></i> إضافة قضية جديدة';
            addBtn.onclick = openAddCaseModal;
        } else {
            addBtn.style.display = 'none';
        }

        loadSectionData();
    }

    // --- COURTS LOGIC ---
    function renderCourts() {
        const container = document.getElementById('courts-container');
        const search = document.getElementById('search-court').value.trim().toLowerCase();
        let filtered = allCourts;

        if (search) {
            filtered = filtered.filter(c => c.name.toLowerCase().includes(search) || c.address.toLowerCase().includes(search));
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">لا توجد محاكم مسجلة</div>`;
            return;
        }

        container.innerHTML = filtered.map(c => `
            <div class="court-card">
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3 style="font-weight:700; color:var(--primary); margin:0;">${c.name}</h3>
                        <span class="status-badge ${c.isActive ? 'open' : 'closed'}">${c.isActive ? 'مفتوحة' : 'مغلقة'}</span>
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-geo-alt"></i> ${c.address}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-tag"></i> تصنيف: محكمة ${c.type}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-telephone"></i> الهاتف: ${c.phone || 'غير متوفر'}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;"><i class="bi bi-door-open"></i> عدد القاعات: ${c.totalRooms}</p>
                </div>
                <div style="display:flex; gap:8px; border-top:1px solid var(--border-color); padding-top:15px; margin-top:10px;">
                    <button class="admin-btn admin-btn-outline admin-btn-sm" style="flex:1" onclick="openAddModal('${c.id}')"><i class="bi bi-pencil"></i> تعديل</button>
                    <button class="admin-btn admin-btn-outline admin-btn-sm" onclick="openAddDeptModal('${c.id}', '${c.name}')"><i class="bi bi-plus-square"></i> إضافة دائرة</button>
                    <button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteCourt('${c.id}')"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    function openAddModal(id = null) {
        document.getElementById('court-id').value = id || '';
        document.getElementById('court-modal-title').textContent = id ? 'تعديل المحكمة' : 'إضافة محكمة جديدة';

        if (id) {
            const court = allCourts.find(c => c.id === id);
            document.getElementById('court-name').value = court.name;
            document.getElementById('court-phone').value = court.phone;
            document.getElementById('court-address').value = court.address;
            document.getElementById('court-rooms').value = court.totalRooms;
            document.getElementById('court-active').checked = court.isActive;
            
            // Map Type
            const typeMap = { "مدنية": "Civil", "جنائية": "Criminal", "أسرة": "Family", "تجارية": "Commercial", "استئناف": "Appeal" };
            document.getElementById('court-type').value = typeMap[court.type] || court.type;
        } else {
            document.getElementById('court-name').value = '';
            document.getElementById('court-phone').value = '';
            document.getElementById('court-address').value = '';
            document.getElementById('court-rooms').value = 10;
            document.getElementById('court-active').checked = true;
        }

        document.getElementById('court-modal').classList.add('show');
    }

    function closeCourtModal() {
        document.getElementById('court-modal').classList.remove('show');
    }

    async function saveCourt() {
        const id = document.getElementById('court-id').value;
        const dto = {
            name: document.getElementById('court-name').value.trim(),
            type: document.getElementById('court-type').value,
            phone: document.getElementById('court-phone').value.trim(),
            address: document.getElementById('court-address').value.trim(),
            totalRooms: parseInt(document.getElementById('court-rooms').value),
            isActive: document.getElementById('court-active').checked
        };

        if (!dto.name || !dto.address) {
            AdminUI.showToast('الاسم والعنوان حقول مطلوبة', 'error');
            return;
        }

        try {
            if (id) {
                await API.adminv2.updateCourt(id, dto);
                AdminUI.showToast('تم تحديث المحكمة بنجاح');
            } else {
                await API.adminv2.createCourt(dto);
                AdminUI.showToast('تم إضافة المحكمة الجديدة بنجاح');
            }
            closeCourtModal();
            loadSectionData();
        } catch (err) {
            console.error(err);
            AdminUI.showToast('فشل حفظ المحكمة', 'error');
        }
    }

    async function deleteCourt(id) {
        AdminUI.confirm('هل أنت متأكد من حذف هذه المحكمة نهائياً؟', async () => {
            try {
                await API.adminv2.deleteCourt(id);
                AdminUI.showToast('تم حذف المحكمة بنجاح');
                loadSectionData();
            } catch (err) {
                console.error(err);
                AdminUI.showToast('فشل الحذف', 'error');
            }
        });
    }

    // --- DEPARTMENTS LOGIC ---
    function openAddDeptModal(courtId, courtName) {
        document.getElementById('dept-court-id').value = courtId;
        document.getElementById('dept-court-name').value = courtName;
        document.getElementById('dept-name').value = '';
        document.getElementById('dept-modal').classList.add('show');
    }

    function closeDeptModal() {
        document.getElementById('dept-modal').classList.remove('show');
    }

    async function saveDept() {
        const dto = {
            courtId: document.getElementById('dept-court-id').value,
            name: document.getElementById('dept-name').value.trim()
        };

        if (!dto.name) {
            AdminUI.showToast('اسم الدائرة مطلوب', 'error');
            return;
        }

        try {
            await API.adminv2.createCourtDepartment(dto);
            AdminUI.showToast('تم إضافة الدائرة القضائية بنجاح');
            closeDeptModal();
        } catch (err) {
            console.error(err);
            AdminUI.showToast('فشل إضافة الدائرة', 'error');
        }
    }

    // --- SERVICES LOGIC ---
    function renderServices() {
        const container = document.getElementById('services-container');
        if (allServices.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">لا توجد خدمات مسجلة</div>`;
            return;
        }

        container.innerHTML = allServices.map(s => `
            <div class="court-card">
                <div>
                    <h3 style="font-weight:700; color:var(--primary); margin-bottom:10px;">${s.name}</h3>
                    <p style="font-size:0.85rem; color:var(--text-color); margin-bottom:8px;">${s.description}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-clock"></i> وقت الحضور التقديري: ${s.estimatedTime} دقيقة</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;"><i class="bi bi-file-earmark-text"></i> المستندات المطلوبة: ${s.requiredDocumentsJson}</p>
                </div>
            </div>
        `).join('');
    }

    function openAddServiceModal() {
        document.getElementById('service-name').value = '';
        document.getElementById('service-desc').value = '';
        document.getElementById('service-time').value = '30';
        document.getElementById('service-docs').value = '["بطاقة الرقم القومي سارية","ملف الدعوى"]';
        document.getElementById('service-modal').classList.add('show');
    }

    function closeServiceModal() {
        document.getElementById('service-modal').classList.remove('show');
    }

    async function saveService() {
        const dto = {
            name: document.getElementById('service-name').value.trim(),
            description: document.getElementById('service-desc').value.trim(),
            estimatedTimeMinutes: parseInt(document.getElementById('service-time').value),
            requiredDocumentsJson: document.getElementById('service-docs').value.trim()
        };

        if (!dto.name) {
            AdminUI.showToast('اسم الخدمة مطلوب', 'error');
            return;
        }

        try {
            await API.adminv2.createCourtService(dto);
            AdminUI.showToast('تم إضافة الخدمة بنجاح');
            closeServiceModal();
            loadSectionData();
        } catch (err) {
            console.error(err);
            AdminUI.showToast('فشل إضافة الخدمة', 'error');
        }
    }

    // --- CASES LOGIC ---
    function renderCases() {
        const container = document.getElementById('cases-container');
        if (allCases.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">لا توجد قضايا مسجلة</div>`;
            return;
        }

        container.innerHTML = allCases.map(c => `
            <div class="case-card">
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3 style="font-weight:700; color:var(--primary); margin:0;">قضية رقم: ${c.caseNumber} / ${c.year}</h3>
                        <span class="status-badge open">${c.status}</span>
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-bank"></i> المحكمة: ${c.courtName}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-tag"></i> الدائرة: ${c.departmentName}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:5px;"><i class="bi bi-person"></i> المدعي: ${c.plaintiff}</p>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;"><i class="bi bi-person-exclamation"></i> المدعى عليه: ${c.defendant}</p>
                </div>
            </div>
        `).join('');
    }

    async function openAddCaseModal() {
        // Load courts
        if (allCourts.length === 0) {
            const res = await API.adminv2.getCourtsList();
            allCourts = res.data || [];
        }

        const courtSel = document.getElementById('case-court');
        courtSel.innerHTML = allCourts.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

        loadCaseDepts();
        
        document.getElementById('case-number').value = '';
        document.getElementById('case-year').value = new Date().getFullYear();
        document.getElementById('case-type').value = 'دعوى مدنية';
        document.getElementById('case-plaintiff').value = '';
        document.getElementById('case-defendant').value = '';
        document.getElementById('case-status').value = 'نشط';

        document.getElementById('case-modal').classList.add('show');
    }

    async function loadCaseDepts() {
        const courtId = document.getElementById('case-court').value;
        if (!courtId) return;

        const res = await API.adminv2.getCourtDepartments(courtId);
        const depts = res.data || [];
        const deptSel = document.getElementById('case-dept');
        
        if (depts.length === 0) {
            deptSel.innerHTML = '<option value="">لا يوجد دوائر مسجلة</option>';
        } else {
            deptSel.innerHTML = depts.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        }
    }

    function closeCaseModal() {
        document.getElementById('case-modal').classList.remove('show');
    }

    async function saveCase() {
        const dto = {
            caseNumber: document.getElementById('case-number').value.trim(),
            year: parseInt(document.getElementById('case-year').value),
            courtId: document.getElementById('case-court').value,
            departmentId: document.getElementById('case-dept').value,
            type: document.getElementById('case-type').value.trim(),
            plaintiff: document.getElementById('case-plaintiff').value.trim(),
            defendant: document.getElementById('case-defendant').value.trim(),
            status: document.getElementById('case-status').value
        };

        if (!dto.caseNumber || !dto.departmentId) {
            AdminUI.showToast('الرقم والدائرة حقول مطلوبة', 'error');
            return;
        }

        try {
            await API.adminv2.createLegalCase(dto);
            AdminUI.showToast('تم إضافة القضية بنجاح');
            closeCaseModal();
            loadSectionData();
        } catch (err) {
            console.error(err);
            AdminUI.showToast('فشل إضافة القضية', 'error');
        }
    }

    // --- BOOKINGS LOGIC ---
    function renderBookings() {
        const tbody = document.getElementById('bookings-table-body');
        if (allBookings.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--text-muted)">لا توجد حجوزات مسجلة</td></tr>`;
            return;
        }

        tbody.innerHTML = allBookings.map(b => `
            <tr>
                <td style="font-weight:700;">${b.fullName}</td>
                <td>${b.nationalId}</td>
                <td>${b.courtName}</td>
                <td>${b.departmentName} / ${b.serviceName}</td>
                <td>${b.caseNumber || '—'}</td>
                <td>${new Date(b.bookingDate).toLocaleDateString('ar-EG')}</td>
                <td>${b.timeSlot}</td>
                <td><span style="font-size:1.1rem; font-weight:700; color:var(--primary);">${b.queueNumber}</span></td>
                <td><span class="status-badge ${getBookingStatusClass(b.status)}">${getBookingStatusLabel(b.status)}</span></td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <button class="admin-btn admin-btn-outline admin-btn-sm" title="تأكيد الحضور" onclick="updateBookingStatus('${b.id}', 'Confirmed')"><i class="bi bi-check-circle"></i></button>
                        <button class="admin-btn admin-btn-danger admin-btn-sm" title="إلغاء الحجز" onclick="updateBookingStatus('${b.id}', 'Cancelled')"><i class="bi bi-x-circle"></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function updateBookingStatus(id, status) {
        try {
            await API.adminv2.updateCourtBookingStatus(id, status);
            AdminUI.showToast('تم تعديل حالة حجز الجلسة بنجاح');
            loadSectionData();
        } catch (err) {
            console.error(err);
            AdminUI.showToast('فشل تعديل حالة الحجز', 'error');
        }
    }

    function getBookingStatusClass(status) {
        switch (status) {
            case 'Confirmed': return 'open';
            case 'Cancelled': return 'closed';
            default: return 'busy';
        }
    }

    function getBookingStatusLabel(status) {
        switch (status) {
            case 'Confirmed': return 'مؤكد';
            case 'Cancelled': return 'ملغى';
            case 'Completed': return 'مكتمل';
            default: return 'معلق';
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - لوحة التحكم v2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin-v2/css/admin.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
        <!-- Header -->
        <header id="header-container" class="admin-header"></header>
        
        <main class="page-content">
            <div class="page-title-area">
                <div>
                    <h1 class="page-title">إعدادات النظام والتحكم</h1>
                    <ul class="breadcrumb">
                        <li><a href="/admin-v2/index.html">الرئيسية</a></li>
                        <li>الإعدادات</li>
                    </ul>
                </div>
            </div>

            <div class="dashboard-row" style="grid-template-columns: 1fr 1fr;">
                <!-- Profile details -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">
                            <i class="bi bi-person-circle"></i> الملف الشخصي للمدير
                        </span>
                    </div>
                    <div class="admin-card-body">
                        <div style="text-align:center; margin-bottom:20px;">
                            <div class="user-avatar" id="settings-avatar" style="width:64px; height:64px; font-size:1.5rem; margin:0 auto 10px;">مد</div>
                            <h3 id="settings-username" style="font-weight:700;">جاري التحميل...</h3>
                            <span class="admin-badge badge-danger" style="margin-top:5px;">مدير عام النظام</span>
                        </div>

                        <div style="display:flex; flex-direction:column; gap:12px; font-size:0.9rem;">
                            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border-color); padding-bottom:8px;">
                                <span style="color:var(--text-muted);">البريد الإلكتروني:</span>
                                <span id="settings-email" style="font-weight:600;">-</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border-color); padding-bottom:8px;">
                                <span style="color:var(--text-muted);">الدور في النظام:</span>
                                <span style="font-weight:600; color:var(--danger)">Admin</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; padding-bottom:8px;">
                                <span style="color:var(--text-muted);">صلاحية الرمز المميز:</span>
                                <span style="font-weight:600; color:var(--success)">نشط (Active)</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- System Info & Tools -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">
                            <i class="bi bi-hdd-network"></i> معلومات النظام وأدوات المطور
                        </span>
                    </div>
                    <div class="admin-card-body">
                        <div style="display:flex; flex-direction:column; gap:15px">
                            <div class="admin-form-group" style="margin:0">
                                <label class="admin-form-label">رابط خادم قاعدة البيانات والـ API</label>
                                <input type="text" class="admin-form-control" id="settings-api-url" readonly>
                            </div>
                            
                            <div>
                                <label class="admin-form-label">روابط سريعة للمطورين</label>
                                <div style="display:flex; gap:10px; flex-wrap:wrap">
                                    <a id="swagger-link" target="_blank" class="admin-btn admin-btn-outline" style="font-size:0.85rem">
                                        <i class="bi bi-file-earmark-code"></i> مستندات Swagger API
                                    </a>
                                    <button class="admin-btn admin-btn-outline" onclick="checkApiHealth()" style="font-size:0.85rem">
                                        <i class="bi bi-heart-pulse"></i> فحص حالة الـ API
                                    </button>
                                </div>
                            </div>

                            <hr style="border:none; border-top:1px solid var(--border-color)">

                            <div>
                                <label class="admin-form-label">تفضيلات لوحة التحكم (مخزنة محلياً)</label>
                                <div style="display:flex; flex-direction:column; gap:10px">
                                    <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; cursor:pointer">
                                        <input type="checkbox" id="pref-collapse" onchange="toggleCollapsePref()">
                                        <span>جعل القائمة الجانبية مغلقة بشكل افتراضي</span>
                                    </label>
                                    <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; cursor:pointer">
                                        <input type="checkbox" id="pref-toast" checked>
                                        <span>تفعيل الإشعارات اللحظية داخل لوحة التحكم</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        AdminUI.init('settings');
        
        // Load User details
        if (typeof Auth !== 'undefined') {
            const user = Auth.getUser();
            document.getElementById('settings-username').textContent = `${user.firstName || 'المدير'} ${user.lastName || 'العام'}`;
            document.getElementById('settings-email').textContent = user.email || 'admin@mawidy.gov.eg';
            
            const initials = (user.firstName || 'م').substring(0, 1) + (user.lastName || 'د').substring(0, 1);
            document.getElementById('settings-avatar').textContent = initials;
        }

        // Set API Urls
        document.getElementById('settings-api-url').value = API_BASE;
        document.getElementById('swagger-link').href = API_BASE.replace('/api', '/swagger');

        // Preferences checkboxes
        document.getElementById('pref-collapse').checked = localStorage.getItem('admin-sidebar-collapsed') === 'true';
    });

    function toggleCollapsePref() {
        const val = document.getElementById('pref-collapse').checked;
        localStorage.setItem('admin-sidebar-collapsed', val);
        if (val) {
            document.body.classList.add('sidebar-collapsed');
        } else {
            document.body.classList.remove('sidebar-collapsed');
        }
        AdminUI.showToast("تم حفظ التفضيلات بنجاح");
    }

    async function checkApiHealth() {
        try {
            const start = Date.now();
            const res = await fetch(`${API_BASE}/branches/governorates`);
            if (res.ok) {
                const duration = Date.now() - start;
                AdminUI.showToast(`الخادم متصل ويعمل بشكل سليم! زمن الاستجابة: ${duration} ملي ثانية`, "success");
            } else {
                AdminUI.showToast("الخادم متصل ولكن أرجع استجابة غير سليمة", "warning");
            }
        } catch (err) {
            AdminUI.showToast("فشل الاتصال بالخادم الرئيسي! يرجى التحقق من تشغيل Backend", "error");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواعيد - لوحة التحكم v2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin-v2/css/admin.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
        <!-- Header -->
        <header id="header-container" class="admin-header"></header>
        
        <main class="page-content">
            <div class="page-title-area">
                <div>
                    <h1 class="page-title">إدارة حجوزات المواطنين</h1>
                    <ul class="breadcrumb">
                        <li><a href="/admin-v2/index.html">الرئيسية</a></li>
                        <li>إدارة المواعيد</li>
                    </ul>
                </div>
                <div>
                    <button class="admin-btn admin-btn-primary" onclick="downloadDailyReport()">
                        <i class="bi bi-file-pdf"></i> تحميل التقرير اليومي PDF
                    </button>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="admin-form-label">تاريخ الموعد</label>
                    <input type="date" id="filter-date" class="admin-form-control" onchange="loadAppointments()">
                </div>
                <div class="filter-group">
                    <label class="admin-form-label">الفرع</label>
                    <select id="filter-branch" class="admin-form-control" onchange="loadAppointments()">
                        <option value="">جميع الفروع</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="admin-form-label">حالة الحجز</label>
                    <select id="filter-status" class="admin-form-control" onchange="applyClientFilters()">
                        <option value="">جميع الحالات</option>
                        <option value="Pending">قيد الانتظار (Pending)</option>
                        <option value="Confirmed">مؤكد (Confirmed)</option>
                        <option value="Completed">مكتمل (Completed)</option>
                        <option value="Cancelled">ملغي (Cancelled)</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1.5;">
                    <label class="admin-form-label">بحث باسم المواطن أو الرقم القومي</label>
                    <input type="text" id="search-citizen" class="admin-form-control" placeholder="ابحث باسم المواطن أو الرقم القومي..." oninput="applyClientFilters()">
                </div>
            </div>

            <!-- Appointments Card -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">
                        <i class="bi bi-calendar-check"></i> مواعيد اليوم المحدد
                    </span>
                    <span id="appointment-count" class="admin-badge badge-info" style="font-size:0.85rem">عدد المواعيد: 0</span>
                </div>
                <div class="admin-card-body" style="padding:0;">
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>اسم المواطن</th>
                                    <th>الرقم القومي</th>
                                    <th>رقم الهاتف</th>
                                    <th>الفرع</th>
                                    <th>الخدمة</th>
                                    <th>الوقت</th>
                                    <th>الحالة</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="appointments-table-body">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>

<script>
    let allAppointments = [];

    document.addEventListener('DOMContentLoaded', async () => {
        AdminUI.init('appointments');
        
        // Set date filter to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('filter-date').value = today;

        await loadBranches();
        await loadAppointments();
    });

    async function loadBranches() {
        try {
            const res = await API.admin.getBranches();
            const select = document.getElementById('filter-branch');
            select.innerHTML = '<option value="">جميع الفروع</option>' +
                res.data.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        } catch (err) {
            console.error(err);
        }
    }

    async function loadAppointments() {
        const tbody = document.getElementById('appointments-table-body');
        tbody.innerHTML = AdminUI.createSkeletonRows(8);

        const date = document.getElementById('filter-date').value;
        const branchId = document.getElementById('filter-branch').value;

        try {
            const response = await API.admin.getAppointments(date || new Date().toISOString().split('T')[0], branchId || null);
            allAppointments = response.data || [];
            applyClientFilters();
        } catch (error) {
            console.error(error);
            AdminUI.showToast('حدث خطأ أثناء تحميل المواعيد', 'error');
        }
    }

    function applyClientFilters() {
        const status = document.getElementById('filter-status').value;
        const search = document.getElementById('search-citizen').value.trim().toLowerCase();
        const tbody = document.getElementById('appointments-table-body');

        let filtered = allAppointments;

        if (status) {
            filtered = filtered.filter(a => a.status === status);
        }

        if (search) {
            filtered = filtered.filter(a => 
                a.userFullName.toLowerCase().includes(search) || 
                a.userNationalId.includes(search)
            );
        }

        document.getElementById('appointment-count').textContent = `عدد المواعيد: ${filtered.length}`;

        if (filtered.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" style="text-align:center; padding: 40px; color:var(--text-muted)">
                        <i class="bi bi-calendar-x" style="font-size:2.5rem; display:block; margin-bottom:10px"></i>
                        لا توجد مواعيد مطابقة للبحث
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = filtered.map(a => {
            let statusClass = 'badge-neutral';
            if (a.status === 'Completed') statusClass = 'badge-success';
            if (a.status === 'Cancelled') statusClass = 'badge-danger';
            if (a.status === 'Confirmed') statusClass = 'badge-info';
            if (a.status === 'Pending') statusClass = 'badge-warning';

            return `
                <tr>
                    <td style="font-weight:700">${a.userFullName}</td>
                    <td><code style="font-size:0.9rem">${a.userNationalId}</code></td>
                    <td>${a.userPhone || '-'}</td>
                    <td>${a.branchName}</td>
                    <td style="font-weight:600">${a.serviceName}</td>
                    <td><span class="admin-badge badge-neutral"><i class="bi bi-clock"></i> ${a.timeSlot}</span></td>
                    <td><span class="admin-badge ${statusClass}">${a.status}</span></td>
                    <td>
                        <select class="admin-form-control admin-form-control-sm" style="width:130px; display:inline-block; padding:5px 10px; font-size:0.8rem"
                            onchange="updateStatus(${a.id}, this.value, this)">
                            <option value="">تغيير الحالة...</option>
                            <option value="0" ${a.status === 'Pending' ? 'disabled' : ''}>قيد الانتظار</option>
                            <option value="1" ${a.status === 'Confirmed' ? 'disabled' : ''}>تأكيد الحجز</option>
                            <option value="2" ${a.status === 'Completed' ? 'disabled' : ''}>تم الحضور</option>
                            <option value="3" ${a.status === 'Cancelled' ? 'disabled' : ''}>إلغاء الحجز</option>
                        </select>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function updateStatus(id, newStatusVal, selectElement) {
        if (!newStatusVal) return;

        const valMap = { "0": "Pending", "1": "Confirmed", "2": "Completed", "3": "Cancelled" };
        const statusText = valMap[newStatusVal];

        AdminUI.confirm(`هل أنت متأكد من تغيير حالة الموعد إلى (${statusText})؟`, async () => {
            try {
                const response = await API.admin.updateAppointmentStatus(id, { status: parseInt(newStatusVal) });
                AdminUI.showToast(response.message || 'تم تحديث حالة الموعد بنجاح');
                await loadAppointments();
            } catch (error) {
                console.error(error);
                AdminUI.showToast(error.message || 'فشل في تحديث حالة الموعد', 'error');
            }
        });
        
        // Reset the select element to "تغيير الحالة..." prompt
        selectElement.value = "";
    }

    async function downloadDailyReport() {
        const date = document.getElementById('filter-date').value;
        const branchId = document.getElementById('filter-branch').value;
        
        let url = `${API_BASE}/admin/reports/daily?date=${date}`;
        if (branchId) url += `&branchId=${branchId}`;

        try {
            AdminUI.showToast('جاري إنشاء تقرير اليوم وتنزيله...', 'info');
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
            });
            if (!response.ok) throw new Error('فشل تحميل التقرير');
            
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `تقرير_المواعيد_${date}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (error) {
            console.error(error);
            AdminUI.showToast('حدث خطأ أثناء تنزيل التقرير', 'error');
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - لوحة التحكم v2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin-v2/css/admin.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
        <!-- Header -->
        <header id="header-container" class="admin-header"></header>
        
        <main class="page-content">
            <div class="page-title-area">
                <div>
                    <h1 class="page-title">إدارة المستخدمين</h1>
                    <ul class="breadcrumb">
                        <li><a href="/admin-v2/index.html">الرئيسية</a></li>
                        <li>إدارة المستخدمين</li>
                    </ul>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group" style="flex: 2;">
                    <label class="admin-form-label">بحث بالاسم، الإيميل أو الرقم القومي</label>
                    <div style="position:relative">
                        <input type="text" id="filter-search" class="admin-form-control" placeholder="ابحث هنا..." oninput="debounceSearch()">
                        <i class="bi bi-search" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-muted)"></i>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="admin-form-label">تصفية حسب الدور</label>
                    <select id="filter-role" class="admin-form-control" onchange="filterData()">
                        <option value="">جميع الأدوار</option>
                        <option value="Citizen">مواطن (Citizen)</option>
                        <option value="BranchAdmin">مسؤول فرع (BranchAdmin)</option>
                        <option value="Admin">مدير عام (Admin)</option>
                    </select>
                </div>
                <div>
                    <button class="admin-btn admin-btn-outline" onclick="resetFilters()">
                        <i class="bi bi-x-circle"></i> إعادة تعيين
                    </button>
                </div>
            </div>

            <!-- Users Table Card -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">
                        <i class="bi bi-people"></i> قائمة المستخدمين المسجلين في النظام
                    </span>
                    <span id="user-total-count" class="admin-badge badge-info" style="font-size:0.85rem">العدد الإجمالي: 0</span>
                </div>
                <div class="admin-card-body" style="padding: 0;">
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>الاسم الكامل</th>
                                    <th>البريد الإلكتروني</th>
                                    <th>الرقم القومي</th>
                                    <th>الدور</th>
                                    <th>الفرع التابع له</th>
                                    <th>عدد الحجوزات</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="admin-pagination" id="users-pagination"></div>
        </main>
    </div>
</div>

<!-- Details Drawer -->
<div class="admin-drawer" id="user-details-drawer">
    <div class="admin-drawer-header">
        <span class="admin-drawer-title">تفاصيل المستخدم</span>
        <button class="admin-modal-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="admin-drawer-body" id="drawer-content">
        <!-- Render details here -->
    </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-backdrop" id="reset-password-modal">
    <div class="admin-modal" style="max-width: 450px;">
        <div class="admin-modal-header">
            <span class="admin-modal-title">إعادة تعيين كلمة المرور</span>
            <button class="admin-modal-close" onclick="closeResetPasswordModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <input type="hidden" id="reset-user-id">
            <div class="admin-form-group">
                <label class="admin-form-label">اسم المستخدم</label>
                <input type="text" id="reset-user-name" class="admin-form-control" readonly>
            </div>
            <div class="admin-form-group">
                <label class="admin-form-label">كلمة المرور الجديدة</label>
                <input type="password" id="reset-new-password" class="admin-form-control" placeholder="ادخل كلمة المرور الجديدة">
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="admin-btn admin-btn-outline" onclick="closeResetPasswordModal()">إلغاء</button>
            <button class="admin-btn admin-btn-primary" id="reset-password-save-btn" onclick="saveResetPassword()">حفظ كلمة المرور</button>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>

<script>
    let currentPage = 1;
    let searchTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
        AdminUI.init('users');
        loadUsers(1);
    });

    async function loadUsers(page = 1) {
        currentPage = page;
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = AdminUI.createSkeletonRows(7);

        const search = document.getElementById('filter-search').value;
        const role = document.getElementById('filter-role').value;

        try {
            const response = await API.adminv2.getUsers(search, role, page, 10);
            const data = response.data;

            document.getElementById('user-total-count').textContent = `العدد الإجمالي: ${data.totalCount}`;

            if (!data.users || data.users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align:center; padding: 40px; color:var(--text-muted)">
                            <i class="bi bi-person-x" style="font-size:2.5rem; display:block; margin-bottom:10px"></i>
                            لم يتم العثور على أي مستخدمين
                        </td>
                    </tr>
                `;
                document.getElementById('users-pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = data.users.map(u => {
                let badgeClass = 'badge-neutral';
                if (u.role === 'Admin') badgeClass = 'badge-danger';
                if (u.role === 'BranchAdmin') badgeClass = 'badge-success';

                return `
                    <tr>
                        <td style="font-weight:700">${u.fullName}</td>
                        <td>${u.email}</td>
                        <td><code style="font-size:0.9rem">${u.nationalId}</code></td>
                        <td><span class="admin-badge ${badgeClass}">${u.role}</span></td>
                        <td>${u.branchName || '-'}</td>
                        <td style="text-align:center">
                            <span class="admin-badge badge-info" style="border-radius:5px">${u.appointmentsCount}</span>
                        </td>
                        <td>
                            <div style="display:flex; gap:8px">
                                <button class="admin-btn admin-btn-outline admin-btn-sm" onclick="viewUserDetail('${u.id}')">
                                    <i class="bi bi-eye"></i> التفاصيل
                                </button>
                                <button class="admin-btn admin-btn-outline admin-btn-sm" onclick="openResetPasswordModal('${u.id}', '${u.fullName}')" style="color:var(--primary-light)">
                                    <i class="bi bi-key"></i> كلمة المرور
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            AdminUI.renderPagination('users-pagination', page, data.totalPages, 'loadUsers');

        } catch (error) {
            console.error(error);
            AdminUI.showToast('حدث خطأ أثناء تحميل قائمة المستخدمين', 'error');
        }
    }

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            loadUsers(1);
        }, 500);
    }

    function filterData() {
        loadUsers(1);
    }

    function resetFilters() {
        document.getElementById('filter-search').value = '';
        document.getElementById('filter-role').value = '';
        loadUsers(1);
    }

    async function viewUserDetail(id) {
        const drawer = document.getElementById('user-details-drawer');
        const content = document.getElementById('drawer-content');
        content.innerHTML = `
            <div style="text-align:center; padding: 40px;">
                <span class="spinner" style="border-color:var(--border-color); border-top-color:var(--primary); width:32px; height:32px"></span>
                <p style="margin-top:10px; color:var(--text-muted)">جاري جلب التفاصيل...</p>
            </div>
        `;
        drawer.classList.add('show');

        try {
            const response = await API.adminv2.getUserDetail(id);
            const u = response.data;

            let badgeClass = 'badge-neutral';
            if (u.role === 'Admin') badgeClass = 'badge-danger';
            if (u.role === 'BranchAdmin') badgeClass = 'badge-success';

            let appointmentsHtml = '';
            if (u.appointments && u.appointments.length > 0) {
                appointmentsHtml = `
                    <div style="margin-top:20px">
                        <h4 style="margin-bottom:10px; font-weight:700; color:var(--primary); border-bottom:1px solid var(--border-color); padding-bottom:5px">سجل الحجوزات (${u.appointments.length})</h4>
                        <div style="display:flex; flex-direction:column; gap:10px">
                            ${u.appointments.map(a => {
                                let statusClass = 'badge-neutral';
                                if (a.status === 'Completed') statusClass = 'badge-success';
                                if (a.status === 'Cancelled') statusClass = 'badge-danger';
                                if (a.status === 'Confirmed') statusClass = 'badge-info';
                                if (a.status === 'Pending') statusClass = 'badge-warning';

                                return `
                                    <div style="background:var(--bg-main); padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border-color)">
                                        <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                                            <span style="font-weight:700; font-size:0.85rem">${a.serviceName}</span>
                                            <span class="admin-badge ${statusClass}">${a.status}</span>
                                        </div>
                                        <div style="font-size:0.75rem; color:var(--text-muted)">
                                            <span><i class="bi bi-building"></i> ${a.branchName}</span>
                                            <span style="margin:0 8px">|</span>
                                            <span><i class="bi bi-calendar"></i> ${new Date(a.appointmentDate).toLocaleDateString('ar-EG')}</span>
                                            <span style="margin:0 8px">|</span>
                                            <span><i class="bi bi-clock"></i> ${a.timeSlot}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            } else {
                appointmentsHtml = `
                    <div style="margin-top:20px; text-align:center; padding:20px; background:var(--bg-main); border-radius:var(--radius-sm); border:1px solid var(--border-color)">
                        <p style="color:var(--text-muted); font-size:0.85rem">لا توجد حجوزات سابقة للمستخدم</p>
                    </div>
                `;
            }

            content.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:15px">
                    <div style="text-align:center; margin-bottom:15px">
                        <div class="user-avatar" style="width:60px; height:60px; font-size:1.5rem; margin:0 auto 10px">${u.firstName.substring(0,1)}${u.lastName.substring(0,1)}</div>
                        <h3 style="font-weight:700">${u.firstName} ${u.lastName}</h3>
                        <span class="admin-badge ${badgeClass}" style="margin-top:5px">${u.role}</span>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr; gap:10px; font-size:0.9rem">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-envelope"></i> البريد الإلكتروني</span>
                            <span style="font-weight:600">${u.email}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-card-text"></i> الرقم القومي</span>
                            <span style="font-weight:600; font-family:monospace">${u.nationalId}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-telephone"></i> رقم الهاتف</span>
                            <span style="font-weight:600">${u.phoneNumber || '-'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-geo"></i> المحافظة</span>
                            <span style="font-weight:600">${u.governorateName}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-map"></i> المنطقة / المركز</span>
                            <span style="font-weight:600">${u.area || '-'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-calendar-event"></i> تاريخ الميلاد</span>
                            <span style="font-weight:600">${new Date(u.dateOfBirth).toLocaleDateString('ar-EG')}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f1f2f6; padding-bottom:8px">
                            <span style="color:var(--text-muted)"><i class="bi bi-building"></i> الفرع الافتراضي</span>
                            <span style="font-weight:600">${u.branchName}</span>
                        </div>
                    </div>

                    ${appointmentsHtml}
                </div>
            `;

        } catch (error) {
            console.error(error);
            AdminUI.showToast('فشل في جلب تفاصيل المستخدم', 'error');
            closeDrawer();
        }
    }

    function closeDrawer() {
        document.getElementById('user-details-drawer').classList.remove('show');
    }

    function openResetPasswordModal(id, fullName) {
        document.getElementById('reset-user-id').value = id;
        document.getElementById('reset-user-name').value = fullName;
        document.getElementById('reset-new-password').value = '';
        document.getElementById('reset-password-modal').classList.add('show');
    }

    function closeResetPasswordModal() {
        document.getElementById('reset-password-modal').classList.remove('show');
    }

    async function saveResetPassword() {
        const id = document.getElementById('reset-user-id').value;
        const password = document.getElementById('reset-new-password').value;
        const btn = document.getElementById('reset-password-save-btn');

        if (!password || password.trim().length < 6) {
            AdminUI.showToast('يجب أن تكون كلمة المرور 6 أحرف على الأقل', 'error');
            return;
        }

        UI.showLoading(btn);
        try {
            const response = await API.adminv2.resetPassword(id, password.trim());
            AdminUI.showToast(response.message || 'تم إعادة تعيين كلمة المرور بنجاح');
            closeResetPasswordModal();
        } catch (error) {
            console.error(error);
            AdminUI.showToast(error.message || 'فشل في إعادة تعيين كلمة المرور', 'error');
        } finally {
            UI.hideLoading(btn);
        }
    }
</script>
</body>
</html>

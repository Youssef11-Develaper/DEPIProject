<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشكاوى - السجل المدني</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #1B4F72, #2E86C1);
            padding: 30px 0;
            color: white;
            margin-bottom: 30px;
        }

        .complaint-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .complaint-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .complaint-body {
            padding: 16px 20px;
        }

        .complaint-description {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .admin-response {
            background: #EAF2FB;
            border-right: 4px solid var(--primary);
            padding: 14px;
            border-radius: var(--radius-sm);
            margin-top: 12px;
        }

        .admin-response-label {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="navbar-brand">
        <i class="bi bi-building-fill"></i>
        السجل المدني الرقمي
    </a>
    <ul class="navbar-nav">
        <li><a href="index.html" class="nav-link">الرئيسية</a></li>
        <li><a href="my-appointments.html" class="nav-link">مواعيدي</a></li>
        <li><a href="profile.html" class="nav-link">حسابي</a></li>
    </ul>
</nav>

<div class="page-header">
    <div class="container">
        <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
                <h1 style="font-size:1.6rem;font-weight:900">الشكاوى</h1>
                <p style="opacity:0.8;font-size:0.9rem;margin-top:4px">تابع شكاواك ومقترحاتك</p>
            </div>
            <button class="btn" style="background:white;color:var(--primary)"
                onclick="openNewComplaint()">
                <i class="bi bi-plus-lg"></i>
                شكوى جديدة
            </button>
        </div>
    </div>
</div>

<div class="container" style="padding-bottom:40px">
    <div id="complaintsContainer">
        <div class="empty-state">
            <div class="spinner" style="border-color:var(--border);border-top-color:var(--primary);width:30px;height:30px;margin:0 auto"></div>
        </div>
    </div>
</div>

<!-- New Complaint Modal -->
<div class="modal-overlay" id="complaintModal">
    <div class="modal" style="max-width:540px">
        <h3 class="modal-title">
            <i class="bi bi-exclamation-circle"></i>
            شكوى جديدة
        </h3>

        <div class="form-group">
            <label class="form-label">عنوان الشكوى</label>
            <input type="text" class="form-control" id="complaintTitle"
                placeholder="اكتب عنوان مختصر">
        </div>

        <div class="form-group">
            <label class="form-label">تفاصيل الشكوى</label>
            <textarea class="form-control" id="complaintDescription" rows="4"
                placeholder="اكتب تفاصيل الشكوى هنا..."></textarea>
        </div>

        <div class="form-group" id="appointmentSelectGroup">
            <label class="form-label">
                مرتبطة بموعد؟
                <span style="color:var(--text-muted);font-weight:400">(اختياري)</span>
            </label>
            <select class="form-control" id="complaintAppointmentId">
                <option value="">غير مرتبطة بموعد</option>
            </select>
        </div>

        <div class="row mt-2">
            <div class="col-6">
                <button class="btn btn-outline btn-block" onclick="closeComplaintModal()">إلغاء</button>
            </div>
            <div class="col-6">
                <button class="btn btn-primary btn-block" onclick="submitComplaint(this)">
                    <i class="bi bi-send"></i>
                    إرسال الشكوى
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function init() {
        UI.redirectIfNotLoggedIn();
        await loadComplaints();
    }

    async function loadComplaints() {
        try {
            const res = await API.complaints.getAll();
            const container = document.getElementById('complaintsContainer');
            const complaints = res.data || [];

            if (!complaints.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-chat-left-text" style="font-size:3rem;color:var(--text-muted)"></i>
                        <p>لا توجد شكاوى</p>
                        <button class="btn btn-primary" onclick="openNewComplaint()">
                            <i class="bi bi-plus-lg"></i>
                            شكوى جديدة
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = complaints.map(c => `
                <div class="complaint-card">
                    <div class="complaint-header">
                        <div style="display:flex;align-items:center;gap:12px">
                            <i class="bi bi-exclamation-circle" style="font-size:1.3rem;color:var(--primary)"></i>
                            <div>
                                <div style="font-weight:700">${c.title}</div>
                                <div style="font-size:0.8rem;color:var(--text-muted)">
                                    ${UI.formatDate(c.createdAt)}
                                </div>
                            </div>
                        </div>
                        ${UI.getComplaintStatusBadge(c.status)}
                    </div>
                    <div class="complaint-body">
                        <p class="complaint-description">${c.description}</p>
                        ${c.appointmentId ? `
                            <div class="alert alert-info" style="padding:8px 12px;font-size:0.85rem">
                                <i class="bi bi-calendar"></i>
                                مرتبطة بموعد #${c.appointmentId}
                            </div>
                        ` : ''}
                        ${c.adminResponse ? `
                            <div class="admin-response">
                                <div class="admin-response-label">
                                    <i class="bi bi-reply"></i>
                                    رد الإدارة
                                </div>
                                <p style="margin:0;font-size:0.9rem">${c.adminResponse}</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        } catch (err) {
            UI.showToast('حدث خطأ في تحميل الشكاوى', 'error');
        }
    }

    async function openNewComplaint() {
        try {
            const res = await API.appointments.getAll();
            const completed = (res.data || []).filter(a => a.status === 'Completed');

            const select = document.getElementById('complaintAppointmentId');
            select.innerHTML = '<option value="">غير مرتبطة بموعد</option>' +
                completed.map(a => `
                    <option value="${a.id}">
                        ${a.serviceName} - ${a.branchName} (${UI.formatDate(a.appointmentDate)})
                    </option>
                `).join('');

            document.getElementById('appointmentSelectGroup').style.display =
                completed.length ? 'block' : 'none';

        } catch (err) {}

        document.getElementById('complaintModal').classList.add('show');
    }

    function closeComplaintModal() {
        document.getElementById('complaintModal').classList.remove('show');
        document.getElementById('complaintTitle').value = '';
        document.getElementById('complaintDescription').value = '';
    }

    async function submitComplaint(btn) {
        const title = document.getElementById('complaintTitle').value.trim();
        const description = document.getElementById('complaintDescription').value.trim();
        const appointmentId = document.getElementById('complaintAppointmentId').value;

        if (!title || !description) {
            UI.showToast('ادخل عنوان وتفاصيل الشكوى', 'error');
            return;
        }

        UI.showLoading(btn);
        try {
            await API.complaints.create({
                title,
                description,
                appointmentId: appointmentId ? parseInt(appointmentId) : null
            });

            UI.showToast('تم إرسال شكواك بنجاح');
            closeComplaintModal();
            await loadComplaints();
        } catch (err) {
            UI.showToast(err.message, 'error');
        } finally {
            UI.hideLoading(btn);
        }
    }

    document.getElementById('complaintModal').addEventListener('click', function(e) {
        if (e.target === this) closeComplaintModal();
    });

    init();
</script>
</body>
</html>

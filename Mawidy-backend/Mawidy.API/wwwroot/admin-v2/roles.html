<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصلاحيات - لوحة التحكم v2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/admin-v2/css/admin.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
        <!-- Header -->
        <header id="header-container" class="admin-header"></header>
        
        <main class="page-content">
            <div class="page-title-area">
                <div>
                    <h1 class="page-title">إدارة الصلاحيات والأدوار</h1>
                    <ul class="breadcrumb">
                        <li><a href="/admin-v2/index.html">الرئيسية</a></li>
                        <li>إدارة الصلاحيات</li>
                    </ul>
                </div>
            </div>

            <div class="dashboard-row" style="grid-template-columns: 1fr 1.3fr;">
                <!-- Add/Update Role Form -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">
                            <i class="bi bi-person-badge"></i> تعيين صلاحية جديدة
                        </span>
                    </div>
                    <div class="admin-card-body">
                        <div class="admin-form-group">
                            <label class="admin-form-label">البريد الإلكتروني للمستخدم</label>
                            <input type="email" class="admin-form-control" id="userEmail" placeholder="ادخل البريد الإلكتروني للمستخدم">
                        </div>

                        <div class="admin-form-group">
                            <label class="admin-form-label">اختر الصلاحية</label>
                            <select class="admin-form-control" id="userRole" onchange="toggleBranchSelect(this.value)">
                                <option value="Citizen">مواطن (Citizen)</option>
                                <option value="BranchAdmin">مسؤول فرع (BranchAdmin)</option>
                                <option value="Admin">مدير عام (Admin)</option>
                            </select>
                        </div>

                        <div class="admin-form-group" id="branchSelectGroup" style="display:none">
                            <label class="admin-form-label">اختر الفرع التابع له</label>
                            <select class="admin-form-control" id="userBranch">
                                <option value="">اختر الفرع...</option>
                            </select>
                        </div>

                        <button class="admin-btn admin-btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;" id="saveRoleBtn" onclick="changeRole()">
                            <i class="bi bi-save"></i> حفظ وتحديث الصلاحية
                        </button>
                    </div>
                </div>

                <!-- Branch Admins List -->
                <div class="admin-card">
                    <div class="admin-card-header">
                        <span class="admin-card-title">
                            <i class="bi bi-shield-lock"></i> مسؤولو الفروع والمدراء الحاليون
                        </span>
                    </div>
                    <div class="admin-card-body" style="padding:0;" id="adminsContainer">
                        <div style="text-align:center; padding: 40px;">
                            <span class="spinner" style="border-color:var(--border-color); border-top-color:var(--primary); width:30px; height:30px"></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        AdminUI.init('roles');
        await Promise.all([loadBranches(), loadBranchAdmins()]);
    });

    async function loadBranches() {
        try {
            const res = await API.admin.getBranches();
            const select = document.getElementById('userBranch');
            select.innerHTML = '<option value="">اختر الفرع...</option>' +
                res.data.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        } catch (err) {
            console.error(err);
        }
    }

    async function loadBranchAdmins() {
        const container = document.getElementById('adminsContainer');
        try {
            const res = await fetch(`${API_BASE}/admin/users`, {
                headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
            });
            const data = await res.json();
            const admins = data.data || [];

            if (!admins.length) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; color:var(--text-muted)">
                        <i class="bi bi-person-x" style="font-size:2.5rem; display:block; margin-bottom:10px"></i>
                        لا يوجد مسؤولو فروع أو مدراء حاليون مضافون
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>البريد الإلكتروني</th>
                                <th>الفرع</th>
                                <th>إزالة</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${admins.map(a => `
                                <tr>
                                    <td style="font-weight:700">${a.user.firstName} ${a.user.lastName}</td>
                                    <td style="font-size:0.85rem; color:var(--text-muted)">${a.user.email}</td>
                                    <td>
                                        <span class="admin-badge badge-info">
                                            ${a.user.branchName || '-'}
                                        </span>
                                    </td>
                                    <td>
                                        <button class="admin-btn admin-btn-outline admin-btn-sm" style="color:var(--danger)"
                                            onclick="removeRole('${a.user.email}', this)">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--danger)">فشل تحميل قائمة المسؤولين</div>`;
        }
    }

    function toggleBranchSelect(role) {
        document.getElementById('branchSelectGroup').style.display =
            role === 'BranchAdmin' ? 'block' : 'none';
    }

    async function changeRole() {
        const email = document.getElementById('userEmail').value.trim();
        const role = document.getElementById('userRole').value;
        const branchId = document.getElementById('userBranch').value;
        const btn = document.getElementById('saveRoleBtn');

        if (!email) {
            AdminUI.showToast('ادخل البريد الإلكتروني للمستخدم', 'error');
            return;
        }

        if (role === 'BranchAdmin' && !branchId) {
            AdminUI.showToast('يجب تحديد الفرع للمسؤول الجديد', 'error');
            return;
        }

        UI.showLoading(btn);
        try {
            const res = await fetch(`${API_BASE}/admin/change-role`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${Auth.getToken()}`
                },
                body: JSON.stringify({
                    email,
                    newRole: role,
                    branchId: branchId ? parseInt(branchId) : null
                })
            });

            const data = await res.json();
            if (!data.success) throw new Error(data.message);

            AdminUI.showToast(data.message || 'تم تحديث الصلاحية بنجاح');
            document.getElementById('userEmail').value = '';
            document.getElementById('userRole').value = 'Citizen';
            toggleBranchSelect('Citizen');
            await loadBranchAdmins();
        } catch (err) {
            AdminUI.showToast(err.message || 'حدث خطأ أثناء حفظ الصلاحية', 'error');
        } finally {
            UI.hideLoading(btn);
        }
    }

    async function removeRole(email, btn) {
        AdminUI.confirm('هل أنت متأكد من إزالة الصلاحية الخاصة بهذا المستخدم وإعادته كمواطن عادي؟', async () => {
            UI.showLoading(btn);
            try {
                const res = await fetch(`${API_BASE}/admin/change-role`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${Auth.getToken()}`
                    },
                    body: JSON.stringify({ email, newRole: 'Citizen', branchId: null })
                });

                const data = await res.json();
                if (!data.success) throw new Error(data.message);

                AdminUI.showToast('تم إزالة الصلاحية وإرجاع المستخدم إلى مواطن');
                await loadBranchAdmins();
            } catch (err) {
                AdminUI.showToast(err.message || 'فشل إزالة الصلاحية', 'error');
            } finally {
                UI.hideLoading(btn);
            }
        });
    }
</script>
</body>
</html>

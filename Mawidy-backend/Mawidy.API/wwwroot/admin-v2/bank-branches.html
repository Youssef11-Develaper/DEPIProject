<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروع البنوك - لوحة التحكم v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="/admin-v2/css/admin.css">
<style>
#map{height:250px;border-radius:var(--radius-sm);border:1px solid var(--border-color);margin-bottom:15px}
.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.branch-card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;justify-content:space-between;transition:all 0.2s;border-top:4px solid #1B5E20}
.branch-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.svc-chip{display:inline-block;padding:3px 9px;border-radius:50px;font-size:0.72rem;font-weight:600;background:#E8F5E9;color:#1B5E20;margin:2px}
.bank-filter-btn{padding:6px 14px;border-radius:50px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border-color);background:var(--card-bg);color:var(--text-color);margin:3px;transition:all 0.2s}
.bank-filter-btn.active{background:#E8F5E9;color:#1B5E20;border-color:#1B5E20}
</style>
</head>
<body>
<div class="app-container">
<div id="sidebar-container"></div>
<div class="main-wrapper">
<header id="header-container" class="admin-header"></header>
<main class="page-content">
<div class="page-title-area">
  <div><h1 class="page-title">🏦 إدارة فروع البنوك</h1>
  <ul class="breadcrumb"><li><a href="/admin-v2/index.html">الرئيسية</a></li><li>فروع البنوك</li></ul></div>
  <button class="admin-btn admin-btn-primary" onclick="openBranchModal()"><i class="bi bi-plus-circle"></i> إضافة فرع</button>
</div>

<div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:25px">
  <div class="stat-card"><div class="stat-icon" style="background:#E8F5E9;color:#1B5E20"><i class="bi bi-bank"></i></div><div class="stat-info"><span class="stat-num" id="stat-count">-</span><span class="stat-label">إجمالي الفروع</span></div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#E3F2FD;color:#0D47A1"><i class="bi bi-list-check"></i></div><div class="stat-info"><span class="stat-num">5</span><span class="stat-label">خدمات بنكية</span></div></div>
</div>

<!-- Bank filter -->
<div class="admin-card" style="margin-bottom:20px">
  <div class="admin-card-header"><span class="admin-card-title"><i class="bi bi-building"></i> تصفية حسب البنك</span></div>
  <div class="admin-card-body" style="padding:15px">
    <button class="bank-filter-btn active" data-key="" onclick="filterBank(this,'')">🏦 الكل</button>
    <button class="bank-filter-btn" data-key="nbe" onclick="filterBank(this,'nbe')">💚 البنك الأهلي المصري</button>
    <button class="bank-filter-btn" data-key="banquemisr" onclick="filterBank(this,'banquemisr')">💛 بنك مصر</button>
    <button class="bank-filter-btn" data-key="cib" onclick="filterBank(this,'cib')">💙 CIB</button>
    <button class="bank-filter-btn" data-key="qnb" onclick="filterBank(this,'qnb')">💜 QNB</button>
    <button class="bank-filter-btn" data-key="alexbank" onclick="filterBank(this,'alexbank')">🧡 بنك الإسكندرية</button>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-group"><label class="admin-form-label">المحافظة</label><select id="filter-gov" class="admin-form-control" onchange="renderBranches()"><option value="">جميع المحافظات</option></select></div>
  <div class="filter-group" style="flex:2"><label class="admin-form-label">بحث</label><input type="text" id="search-branch" class="admin-form-control" placeholder="ابحث باسم الفرع..." oninput="renderBranches()"></div>
</div>

<div class="branch-grid" id="branches-container"></div>
</main></div></div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="branch-modal">
<div class="admin-modal" style="max-width:600px;max-height:90vh;overflow-y:auto">
<div class="admin-modal-header"><span class="admin-modal-title" id="modal-title">إضافة فرع بنك</span><button class="admin-modal-close" onclick="closeBranchModal()">&times;</button></div>
<div class="admin-modal-body">
  <input type="hidden" id="branch-id">
  <div class="admin-form-group"><label class="admin-form-label">البنك</label>
    <select id="branch-operator" class="admin-form-control"><option value="">اختر البنك...</option></select></div>
  <div class="admin-form-group"><label class="admin-form-label">اسم الفرع</label><input type="text" id="branch-name" class="admin-form-control" placeholder="مثال: البنك الأهلي - فرع مدينة نصر"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
    <div class="admin-form-group"><label class="admin-form-label">المحافظة</label><select id="branch-gov" class="admin-form-control"></select></div>
    <div class="admin-form-group"><label class="admin-form-label">المنطقة</label><select id="branch-district" class="admin-form-control"></select></div>
  </div>
  <div class="admin-form-group"><label class="admin-form-label">العنوان</label><input type="text" id="branch-address" class="admin-form-control" placeholder="العنوان بالتفصيل"></div>
  <div class="admin-form-group">
    <label class="admin-form-label">الموقع الجغرافي</label>
    <div id="map"></div>
    <div style="display:flex;gap:10px">
      <div style="flex:1"><label class="admin-form-label" style="font-size:0.75rem">خط العرض</label><input type="text" id="branch-lat" class="admin-form-control" readonly></div>
      <div style="flex:1"><label class="admin-form-label" style="font-size:0.75rem">خط الطول</label><input type="text" id="branch-lng" class="admin-form-control" readonly></div>
    </div>
  </div>
</div>
<div class="admin-modal-footer"><button class="admin-btn admin-btn-outline" onclick="closeBranchModal()">إلغاء</button><button class="admin-btn admin-btn-primary" id="saveBranchBtn" onclick="saveBranch()">حفظ</button></div>
</div></div>

<!-- Settings Drawer -->
<div class="admin-drawer" id="branch-settings-drawer" style="width:550px">
<div class="admin-drawer-header"><span class="admin-drawer-title" id="drawer-title">إعدادات الفرع</span><button class="admin-modal-close" onclick="closeSettingsDrawer()">&times;</button></div>
<div class="admin-drawer-body">
  <input type="hidden" id="settings-branch-id">
  <div style="display:flex;border-bottom:1px solid var(--border-color);margin-bottom:20px">
    <button class="admin-btn" style="flex:1;border-radius:0;border-bottom:2px solid var(--primary);background:none" id="tab-schedules-btn" onclick="switchTab('schedules')">مواعيد العمل</button>
    <button class="admin-btn" style="flex:1;border-radius:0;background:none" id="tab-holidays-btn" onclick="switchTab('holidays')">الإجازات</button>
    <button class="admin-btn" style="flex:1;border-radius:0;background:none" id="tab-services-btn" onclick="switchTab('services')">الخدمات</button>
  </div>
  
  <!-- Tab schedules -->
  <div id="tab-schedules">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="admin-form-group"><label class="admin-form-label">اليوم</label><select id="sch-day" class="admin-form-control"><option value="0">الأحد</option><option value="1">الإثنين</option><option value="2">الثلاثاء</option><option value="3">الأربعاء</option><option value="4">الخميس</option><option value="5">الجمعة</option><option value="6">السبت</option></select></div>
      <div class="admin-form-group"><label class="admin-form-label">أقصى مواعيد</label><input type="number" id="sch-max" class="admin-form-control" value="10"></div>
      <div class="admin-form-group"><label class="admin-form-label">الفتح</label><input type="time" id="sch-open" class="admin-form-control" value="09:00"></div>
      <div class="admin-form-group"><label class="admin-form-label">الإغلاق</label><input type="time" id="sch-close" class="admin-form-control" value="15:00"></div>
    </div>
    <button class="admin-btn admin-btn-primary" style="margin-bottom:20px" onclick="addSchedule()">إضافة يوم العمل</button>
    <div id="schedules-list"></div>
  </div>

  <!-- Tab holidays -->
  <div id="tab-holidays" style="display:none">
    <div class="admin-form-group"><label class="admin-form-label">التاريخ</label><input type="date" id="holiday-date" class="admin-form-control"></div>
    <div class="admin-form-group"><label class="admin-form-label">السبب</label><input type="text" id="holiday-reason" class="admin-form-control" placeholder="مثال: عيد الأضحى"></div>
    <button class="admin-btn admin-btn-primary" style="margin-bottom:20px" onclick="addHoliday()">إضافة إجازة</button>
    <div id="holidays-list"></div>
  </div>

  <!-- Tab services -->
  <div id="tab-services" style="display:none">
    <h4 style="font-weight:700;margin-bottom:15px" id="service-form-title">إضافة خدمة جديدة</h4>
    <input type="hidden" id="service-id">
    <div class="admin-form-group">
        <label class="admin-form-label">اسم الخدمة (بالعربية)</label>
        <input type="text" id="service-name-ar" class="admin-form-control" placeholder="مثال: خدمة العملاء">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
        <div class="admin-form-group">
            <label class="admin-form-label">مفتاح الخدمة (Service Key)</label>
            <input type="text" id="service-key" class="admin-form-control" placeholder="customer_service">
        </div>
        <div class="admin-form-group">
            <label class="admin-form-label">الوقت المتوقع (Estimated Time)</label>
            <input type="text" id="service-time" class="admin-form-control" placeholder="15 دقيقة">
        </div>
    </div>
    <div class="admin-form-group">
        <label class="admin-form-label">أيقونة الخدمة (Bootstrap Icon class)</label>
        <input type="text" id="service-icon" class="admin-form-control" placeholder="bi-people">
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
        <button class="admin-btn admin-btn-primary" id="save-service-btn" onclick="saveOperatorService()">إضافة الخدمة</button>
        <button class="admin-btn admin-btn-outline" id="cancel-service-btn" style="display:none" onclick="clearServiceForm()">إلغاء</button>
    </div>
    <h4 style="font-weight:700;margin-bottom:10px">قائمة الخدمات الحالية</h4>
    <div id="services-list"></div>
  </div>
</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/api.js"></script>
<script src="/admin-v2/js/admin-api.js"></script>
<script src="/admin-v2/js/admin-ui.js"></script>
<script>
const BANK_KEYS = ['nbe','banquemisr','cib','qnb','alexbank'];
const SVC_LABELS = ['🏦 فتح حساب جديد','💳 إصدار بطاقات ائتمان','💰 القروض والتمويل','💵 خدمات الصراف','👥 خدمة العملاء'];
const DAYS = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
let allBranches=[], operators=[], bankOpIds=[], governorates=[], activeBankKey='';
let map, marker;
const defCoords=[30.0444,31.2357];

document.addEventListener('DOMContentLoaded', async()=>{
  AdminUI.init('bank-branches');
  await loadOperators();
  await loadGovernorates();
  await loadBranches();
  initMap();
  document.getElementById('branch-gov').addEventListener('change', async e=>await loadDistricts(parseInt(e.target.value)));
});

async function loadOperators(){
  const res=await API.adminv2.getOperators();
  operators=res.data||[];
  const banks=operators.filter(o=>BANK_KEYS.includes(o.key));
  bankOpIds=banks.map(o=>o.id);
  document.getElementById('branch-operator').innerHTML='<option value="">اختر البنك...</option>'+banks.map(o=>`<option value="${o.id}">${o.emoji} ${o.nameAr}</option>`).join('');
}

async function loadGovernorates(){
  const res=await API.branches.getGovernorates();
  governorates=res.data||[];
  const opts=governorates.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
  document.getElementById('filter-gov').innerHTML='<option value="">جميع المحافظات</option>'+opts;
  document.getElementById('branch-gov').innerHTML=opts;
  if(governorates.length>0) await loadDistricts(governorates[0].id);
}

async function loadDistricts(govId){
  const res=await API.adminv2.getDistricts(govId);
  document.getElementById('branch-district').innerHTML=(res.data||[]).map(d=>`<option value="${d.id}">${d.nameAr} (${d.type})</option>`).join('');
}

async function loadBranches(){
  try{
    const res=await API.admin.getBranches();
    allBranches=(res.data||[]).filter(b=>bankOpIds.includes(b.operatorId));
    document.getElementById('stat-count').textContent=allBranches.length;
    renderBranches();
  }catch(e){AdminUI.showToast('فشل تحميل الفروع','error');}
}

function filterBank(el,key){
  document.querySelectorAll('.bank-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  activeBankKey=key;
  renderBranches();
}

function renderBranches(){
  const govId=document.getElementById('filter-gov').value;
  const search=document.getElementById('search-branch').value.trim().toLowerCase();
  let filtered=allBranches;
  if(activeBankKey){
    const op=operators.find(o=>o.key===activeBankKey);
    if(op) filtered=filtered.filter(b=>b.operatorId===op.id);
  }
  if(govId) filtered=filtered.filter(b=>b.governorateId===parseInt(govId));
  if(search) filtered=filtered.filter(b=>b.name.toLowerCase().includes(search)||b.address.toLowerCase().includes(search));
  const c=document.getElementById('branches-container');
  if(!filtered.length){c.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)"><i class="bi bi-bank" style="font-size:3rem;display:block;margin-bottom:10px"></i>لا توجد فروع</div>`;return;}
  const opMap={};operators.forEach(o=>opMap[o.id]=o);
  c.innerHTML=filtered.map(b=>{
    const op=opMap[b.operatorId]||{};
    return `<div class="branch-card" style="border-top-color:${op.color||'#1B5E20'}">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h3 style="font-weight:700;color:${op.color||'var(--primary)'};margin:0;font-size:0.95rem">${b.name}</h3>
          <span style="font-size:1.2rem">${op.emoji||'🏦'}</span>
        </div>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:5px"><i class="bi bi-geo-alt"></i> ${b.governorateName} — ${b.address}</p>
        <div style="margin-top:8px">${SVC_LABELS.map(s=>`<span class="svc-chip">${s}</span>`).join('')}</div>
      </div>
      <div style="display:flex;gap:8px;border-top:1px solid var(--border-color);padding-top:12px;margin-top:10px">
        <button class="admin-btn admin-btn-outline admin-btn-sm" style="flex:1" onclick="openBranchModal(${b.id})"><i class="bi bi-pencil"></i> تعديل</button>
        <button class="admin-btn admin-btn-outline admin-btn-sm" style="flex:1" onclick="openSettingsDrawer(${b.id},'${b.name}')"><i class="bi bi-gear"></i> إعدادات</button>
        <button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteBranch(${b.id})"><i class="bi bi-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

function initMap(){
  map=L.map('map').setView(defCoords,10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  marker=L.marker(defCoords,{draggable:false}).addTo(map);
  map.on('click',e=>{marker.setLatLng([e.latlng.lat,e.latlng.lng]);document.getElementById('branch-lat').value=e.latlng.lat.toFixed(6);document.getElementById('branch-lng').value=e.latlng.lng.toFixed(6);});
}

async function openBranchModal(id=null){
  document.getElementById('branch-id').value=id||'';
  document.getElementById('modal-title').textContent=id?'تعديل الفرع':'إضافة فرع بنك';
  if(id){
    const b=allBranches.find(x=>x.id===id);
    document.getElementById('branch-operator').value=b.operatorId;
    document.getElementById('branch-name').value=b.name;
    document.getElementById('branch-gov').value=b.governorateId;
    await loadDistricts(b.governorateId);
    document.getElementById('branch-district').value=b.districtId;
    document.getElementById('branch-address').value=b.address;
    document.getElementById('branch-lat').value=b.latitude;
    document.getElementById('branch-lng').value=b.longitude;
    marker.setLatLng([b.latitude,b.longitude]);map.setView([b.latitude,b.longitude],14);
  }else{
    ['branch-name','branch-address'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('branch-lat').value=defCoords[0];document.getElementById('branch-lng').value=defCoords[1];
    if(governorates.length>0){document.getElementById('branch-gov').value=governorates[0].id;await loadDistricts(governorates[0].id);}
    marker.setLatLng(defCoords);map.setView(defCoords,10);
  }
  document.getElementById('branch-modal').classList.add('show');
  setTimeout(()=>map.invalidateSize(),300);
}
function closeBranchModal(){document.getElementById('branch-modal').classList.remove('show');}

async function saveBranch(){
  const id=document.getElementById('branch-id').value;
  const operatorId=parseInt(document.getElementById('branch-operator').value);
  const name=document.getElementById('branch-name').value.trim();
  const governorateId=parseInt(document.getElementById('branch-gov').value);
  const districtId=parseInt(document.getElementById('branch-district').value);
  const address=document.getElementById('branch-address').value.trim();
  const latitude=parseFloat(document.getElementById('branch-lat').value);
  const longitude=parseFloat(document.getElementById('branch-lng').value);
  const btn=document.getElementById('saveBranchBtn');
  if(!name||!address||!operatorId){AdminUI.showToast('يرجى ملء جميع الحقول','error');return;}
  const dto={name,address,latitude,longitude,governorateId,operatorId,districtId};
  UI.showLoading(btn);
  try{
    if(id){await API.admin.updateBranch(parseInt(id),dto);AdminUI.showToast('تم التحديث');}
    else{await API.admin.createBranch(dto);AdminUI.showToast('تم الإضافة');}
    closeBranchModal();await loadBranches();
  }catch(e){AdminUI.showToast(e.message||'فشل','error');}
  finally{UI.hideLoading(btn);}
}

async function deleteBranch(id){
  AdminUI.confirm('حذف هذا الفرع نهائياً؟',async()=>{
    try{await API.admin.deleteBranch(id);AdminUI.showToast('تم الحذف');await loadBranches();}
    catch(e){AdminUI.showToast(e.message||'فشل','error');}
  });
}

async function openSettingsDrawer(id,name){
  document.getElementById('settings-branch-id').value=id;
  document.getElementById('drawer-title').textContent=`إعدادات — ${name}`;
  document.getElementById('branch-settings-drawer').classList.add('show');
  switchTab('schedules');await loadBranchSettings(id);
}
function closeSettingsDrawer(){document.getElementById('branch-settings-drawer').classList.remove('show');}
function switchTab(tab){
  document.getElementById('tab-schedules').style.display=tab==='schedules'?'block':'none';
  document.getElementById('tab-holidays').style.display=tab==='holidays'?'block':'none';
  document.getElementById('tab-services').style.display=tab==='services'?'block':'none';
  document.getElementById('tab-schedules-btn').style.borderBottom=tab==='schedules'?'2px solid var(--primary)':'none';
  document.getElementById('tab-holidays-btn').style.borderBottom=tab==='holidays'?'2px solid var(--primary)':'none';
  document.getElementById('tab-services-btn').style.borderBottom=tab==='services'?'2px solid var(--primary)':'none';
}

async function loadBranchSettings(branchId){
  document.getElementById('schedules-list').innerHTML='<p>جاري التحميل...</p>';
  document.getElementById('holidays-list').innerHTML='<p>جاري التحميل...</p>';
  clearServiceForm();
  try{
    const res=await fetch(`${API_BASE}/branches/${branchId}`,{headers:{'Authorization':`Bearer ${Auth.getToken()}`}});
    const data=await res.json();const branch=data.data;
    document.getElementById('schedules-list').innerHTML=branch.schedules&&branch.schedules.length
      ?`<table class="admin-table"><thead><tr><th>اليوم</th><th>المواعيد</th><th>حذف</th></tr></thead><tbody>${branch.schedules.map(s=>`<tr><td>${AdminUI.getDayName(s.dayOfWeek)}</td><td>${s.openTime.substring(0,5)} - ${s.closeTime.substring(0,5)}</td><td><button class="admin-btn admin-btn-outline admin-btn-sm" style="color:var(--danger)" onclick="deleteSchedule(${s.id})"><i class="bi bi-trash"></i></button></td></tr>`).join('')}</tbody></table>`
      :'<p style="color:var(--text-muted)">لا توجد جداول</p>';
    document.getElementById('holidays-list').innerHTML=branch.holidays&&branch.holidays.length
      ?`<table class="admin-table"><thead><tr><th>التاريخ</th><th>السبب</th><th>حذف</th></tr></thead><tbody>${branch.holidays.map(h=>`<tr><td>${new Date(h.date).toLocaleDateString('ar-EG')}</td><td>${h.reason}</td><td><button class="admin-btn admin-btn-outline admin-btn-sm" style="color:var(--danger)" onclick="deleteHoliday(${h.id})"><i class="bi bi-trash"></i></button></td></tr>`).join('')}</tbody></table>`
      :'<p style="color:var(--text-muted)">لا توجد إجازات</p>';
      
    if (branch.operatorId) {
      await loadOperatorServices(branch.operatorId);
    }
  }catch(e){document.getElementById('schedules-list').innerHTML='<p style="color:var(--danger)">فشل التحميل</p>';}
}

async function loadOperatorServices(operatorId) {
    document.getElementById('services-list').innerHTML = '<span class="spinner"></span> جاري التحميل...';
    try {
        const res = await API.adminv2.getOperatorServices(operatorId);
        const services = res.data || [];
        const container = document.getElementById('services-list');
        if (services.length > 0) {
            container.innerHTML = `
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>الأيقونة</th>
                                <th>اسم الخدمة</th>
                                <th>الوقت</th>
                                <th>تعديل</th>
                                <th>حذف</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${services.map(s => `
                                <tr>
                                    <td><i class="bi ${s.icon || 'bi-bookmark'}"></i></td>
                                    <td>${s.nameAr}</td>
                                    <td>${s.estimatedTime}</td>
                                    <td>
                                        <button class="admin-btn admin-btn-outline admin-btn-sm" style="color:var(--primary)" onclick="editService(${s.id}, '${s.nameAr.replace(/'/g, "\\'")}', '${s.serviceKey}', '${s.estimatedTime}', '${s.icon}')">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                    </td>
                                    <td>
                                        <button class="admin-btn admin-btn-outline admin-btn-sm" style="color:var(--danger)" onclick="deleteService(${s.id})">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        } else {
            container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem">لا توجد خدمات مضافة لهذه الجهة</p>';
        }
    } catch(e) {
        document.getElementById('services-list').innerHTML = '<p style="color:var(--danger)">فشل تحميل الخدمات</p>';
    }
}

function editService(id, nameAr, serviceKey, estimatedTime, icon) {
    document.getElementById('service-id').value = id;
    document.getElementById('service-name-ar').value = nameAr;
    document.getElementById('service-key').value = serviceKey;
    document.getElementById('service-time').value = estimatedTime;
    document.getElementById('service-icon').value = icon;
    document.getElementById('service-form-title').textContent = 'تعديل الخدمة';
    document.getElementById('save-service-btn').textContent = 'حفظ التعديلات';
    document.getElementById('cancel-service-btn').style.display = 'inline-block';
}

function clearServiceForm() {
    document.getElementById('service-id').value = '';
    document.getElementById('service-name-ar').value = '';
    document.getElementById('service-key').value = '';
    document.getElementById('service-time').value = '';
    document.getElementById('service-icon').value = '';
    document.getElementById('service-form-title').textContent = 'إضافة خدمة جديدة';
    document.getElementById('save-service-btn').textContent = 'إضافة الخدمة';
    document.getElementById('cancel-service-btn').style.display = 'none';
}

async function saveOperatorService() {
    const branchId = document.getElementById('settings-branch-id').value;
    const b = allBranches.find(x => x.id === parseInt(branchId));
    if (!b) return;
    
    const serviceId = document.getElementById('service-id').value;
    const nameAr = document.getElementById('service-name-ar').value.trim();
    const serviceKey = document.getElementById('service-key').value.trim();
    const estimatedTime = document.getElementById('service-time').value.trim();
    const icon = document.getElementById('service-icon').value.trim();
    
    if (!nameAr || !serviceKey) {
        AdminUI.showToast('يرجى ملء اسم الخدمة ومفتاح الخدمة', 'error');
        return;
    }

    const dto = {
        operatorId: b.operatorId,
        serviceKey,
        nameAr,
        estimatedTime: estimatedTime || '15 دقيقة',
        icon: icon || 'bi-bookmark'
    };

    try {
        if (serviceId) {
            await API.adminv2.updateOperatorService(parseInt(serviceId), dto);
            AdminUI.showToast('تم تعديل الخدمة بنجاح');
        } else {
            await API.adminv2.createOperatorService(dto);
            AdminUI.showToast('تم إضافة الخدمة بنجاح');
        }
        clearServiceForm();
        await loadOperatorServices(b.operatorId);
    } catch(e) {
        AdminUI.showToast(e.message || 'فشل الحفظ', 'error');
    }
}

async function deleteService(id) {
    const branchId = document.getElementById('settings-branch-id').value;
    const b = allBranches.find(x => x.id === parseInt(branchId));
    if (!b) return;

    AdminUI.confirm('هل أنت متأكد من حذف هذه الخدمة؟', async () => {
        try {
            await API.adminv2.deleteOperatorService(id);
            AdminUI.showToast('تم حذف الخدمة بنجاح');
            await loadOperatorServices(b.operatorId);
        } catch(e) {
            AdminUI.showToast(e.message || 'فشل حذف الخدمة', 'error');
        }
    });
}

async function addSchedule(){
  const branchId=document.getElementById('settings-branch-id').value;
  const dto={dayOfWeek:parseInt(document.getElementById('sch-day').value),openTime:document.getElementById('sch-open').value+':00',closeTime:document.getElementById('sch-close').value+':00',peakStartTime:'11:00:00',peakEndTime:'13:00:00',maxAppointmentsPerSlot:parseInt(document.getElementById('sch-max').value)};
  try{await API.admin.addSchedule(parseInt(branchId),dto);AdminUI.showToast('تم إضافة يوم العمل');await loadBranchSettings(branchId);}
  catch(e){AdminUI.showToast(e.message||'فشل','error');}
}
async function deleteSchedule(id){
  const branchId=document.getElementById('settings-branch-id').value;
  AdminUI.confirm('حذف يوم العمل؟',async()=>{try{await API.admin.deleteSchedule(id);AdminUI.showToast('تم');await loadBranchSettings(branchId);}catch(e){AdminUI.showToast(e.message||'فشل','error');}});
}
async function addHoliday(){
  const branchId=document.getElementById('settings-branch-id').value;
  const date=document.getElementById('holiday-date').value,reason=document.getElementById('holiday-reason').value.trim();
  if(!date||!reason){AdminUI.showToast('يرجى تحديد التاريخ والسبب','error');return;}
  try{await API.admin.addHoliday(parseInt(branchId),{date,reason});AdminUI.showToast('تم');document.getElementById('holiday-date').value='';document.getElementById('holiday-reason').value='';await loadBranchSettings(branchId);}
  catch(e){AdminUI.showToast(e.message||'فشل','error');}
}
async function deleteHoliday(id){
  const branchId=document.getElementById('settings-branch-id').value;
  AdminUI.confirm('حذف الإجازة؟',async()=>{try{await API.admin.deleteHoliday(id);AdminUI.showToast('تم');await loadBranchSettings(branchId);}catch(e){AdminUI.showToast(e.message||'فشل','error');}});
}
</script>

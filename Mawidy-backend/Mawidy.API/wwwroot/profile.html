<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - السجل المدني</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #1B4F72, #2E86C1);
            padding: 40px 0;
            color: white;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
        }

        .stat-mini {
            text-align: center;
            padding: 16px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .stat-mini .value {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
        }

        .stat-mini .label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" style="background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); height: 64px; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; list-style: none;">
    <a href="index.html" class="navbar-brand" style="color: white; font-weight: 900; font-size: 1.4rem; text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <i class="bi bi-calendar2-check-fill" style="color: #6366F1;"></i>
        مـوعـدي
    </a>
    <ul class="navbar-nav" id="navLinks" style="display: flex; align-items: center; gap: 8px; list-style: none;">
        <li><a href="index.html" class="nav-link" style="color: white;">الرئيسية</a></li>
        <li class="nav-item-dropdown">
            <a class="nav-link dropdown-toggle" style="color: white;">القطاعات المتاحة</a>
            <ul class="dropdown-menu">
                <li><a href="civil-registry.html" class="dropdown-item"><i class="bi bi-building"></i> السجل المدني</a></li>
                <li><a href="mawidy-courts.html" class="dropdown-item"><i class="bi bi-bank"></i> المحاكم والنيابات</a></li>
                <li><a href="/Branch" class="dropdown-item"><i class="bi bi-phone"></i> شركات الاتصالات</a></li>
                <li><a href="/Hospitals/Maw3dyCare/Index" class="dropdown-item"><i class="bi bi-heart-pulse"></i> المستشفيات والعيادات</a></li>
                <li><a href="/Banks/Home/Index" class="dropdown-item"><i class="bi bi-cash-coin"></i> البنوك والخدمات المالية</a></li>
            </ul>
        </li>
        <li><a href="my-appointments.html" class="nav-link" id="myAppointmentsLink" style="display:none">مواعيدي</a></li>
        <li><a href="complaints.html" class="nav-link" id="complaintsLink" style="display:none">الشكاوى</a></li>
        <li><a href="profile.html" class="nav-link" id="profileLink" style="display:none">حسابي</a></li>
        <li id="adminLink" style="display:none"><a href="admin-v2/index.html" class="nav-link" style="color: #6366F1; font-weight: 700;">لوحة التحكم</a></li>
        <li id="loginBtn" style="display:none"><button class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.25)">تسجيل الدخول</button></li>
        <li id="logoutBtn" style="display:none"><button class="btn btn-outline" onclick="logout()" style="color:white;border-color:rgba(255,255,255,0.25)">خروج</button></li>
    </ul>
</nav>

<div class="page-header">
    <div class="container text-center">
        <div class="profile-avatar">
            <i class="bi bi-person-fill"></i>
        </div>
        <h1 style="font-size:1.6rem;font-weight:900" id="profileName">...</h1>
        <p style="opacity:0.8;font-size:0.9rem" id="profileEmail">...</p>
    </div>
</div>

<div class="container" style="padding-bottom:40px">

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px" id="statsGrid">
        <div class="stat-mini">
            <div class="value" id="statTotal">0</div>
            <div class="label">كل المواعيد</div>
        </div>
        <div class="stat-mini">
            <div class="value" style="color:var(--success)" id="statCompleted">0</div>
            <div class="label">مكتملة</div>
        </div>
        <div class="stat-mini">
            <div class="value" style="color:var(--danger)" id="statCancelled">0</div>
            <div class="label">ملغية</div>
        </div>
        <div class="stat-mini">
            <div class="value" style="color:#D4AC0D" id="statComplaints">0</div>
            <div class="label">شكاوى</div>
        </div>
    </div>

    <div class="row">
        <!-- Edit Profile -->
        <div class="col-6">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-person"></i>
                    تعديل البيانات
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label class="form-label">الاسم الأول</label>
                                <input type="text" class="form-control" id="firstName">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label class="form-label">اسم العائلة</label>
                                <input type="text" class="form-control" id="lastName">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="tel" class="form-control" id="phoneNumber">
                    </div>

                    <div class="form-group">
                        <label class="form-label">المحافظة</label>
                        <select class="form-control" id="governorateId">
                            <option value="">اختر المحافظة</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">المنطقة</label>
                        <input type="text" class="form-control" id="area"
                            placeholder="مثال: مصر الجديدة">
                    </div>

                    <button class="btn btn-primary btn-block" onclick="updateProfile(this)">
                        <i class="bi bi-save"></i>
                        حفظ التعديلات
                    </button>
                </div>
            </div>
        </div>

        <!-- Account Info -->
        <div class="col-6">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-shield-lock"></i>
                    معلومات الحساب
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="email" readonly
                            style="background:#F8F9FA">
                    </div>

                    <div class="form-group">
                        <label class="form-label">الرقم القومي</label>
                        <input type="text" class="form-control" id="nationalId" readonly
                            style="background:#F8F9FA">
                    </div>

                    <div class="form-group">
                        <label class="form-label">تاريخ الميلاد</label>
                        <input type="text" class="form-control" id="dateOfBirth" readonly
                            style="background:#F8F9FA">
                    </div>

                    <hr>

                    <button class="btn btn-outline btn-block" onclick="logout()"
                        style="border-color:var(--danger);color:var(--danger)">
                        <i class="bi bi-box-arrow-right"></i>
                        تسجيل الخروج
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function init() {
        UI.redirectIfNotLoggedIn();
        updateNavbar();
        await Promise.all([loadProfile(), loadStats(), loadGovernorates()]);
    }

    function updateNavbar() {
        const isLoggedIn = Auth.isLoggedIn();
        const isAdmin = Auth.isAdmin();
        const isBranchAdmin = Auth.isBranchAdmin();

        document.getElementById('loginBtn').style.display = isLoggedIn ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = isLoggedIn ? 'block' : 'none';
        document.getElementById('myAppointmentsLink').style.display = isLoggedIn ? 'block' : 'none';
        document.getElementById('complaintsLink').style.display = isLoggedIn ? 'block' : 'none';
        document.getElementById('profileLink').style.display = isLoggedIn ? 'block' : 'none';
        document.getElementById('adminLink').style.display = (isAdmin || isBranchAdmin) ? 'block' : 'none';
    }

    function logout() {
        Auth.clearSession();
        updateNavbar();
        UI.showToast('تم تسجيل الخروج');
        setTimeout(() => window.location.href = 'index.html', 1000);
    }

    async function loadProfile() {
        try {
            const res = await API.auth.getProfile();
            const user = res.data;

            document.getElementById('profileName').textContent =
                `${user.firstName} ${user.lastName}`;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('firstName').value = user.firstName;
            document.getElementById('lastName').value = user.lastName;
            document.getElementById('phoneNumber').value = user.phoneNumber || '';
            document.getElementById('area').value = user.area || '';
            document.getElementById('email').value = user.email;
            document.getElementById('governorateId').value = user.governorateId || '';

            // Wait for governorates to load
            setTimeout(() => {
                if (user.governorateId) {
                    document.getElementById('governorateId').value = user.governorateId;
                }
            }, 500);

        } catch (err) {
            UI.showToast('حدث خطأ في تحميل البيانات', 'error');
        }
    }

    async function loadStats() {
        try {
            const [appointmentsRes, complaintsRes] = await Promise.all([
                API.appointments.getAll(),
                API.complaints.getAll()
            ]);

            const appointments = appointmentsRes.data || [];
            const complaints = complaintsRes.data || [];

            document.getElementById('statTotal').textContent = appointments.length;
            document.getElementById('statCompleted').textContent =
                appointments.filter(a => a.status === 'Completed').length;
            document.getElementById('statCancelled').textContent =
                appointments.filter(a => a.status === 'Cancelled').length;
            document.getElementById('statComplaints').textContent = complaints.length;
        } catch (err) {}
    }

    async function loadGovernorates() {
        try {
            const res = await API.branches.getGovernorates();
            const select = document.getElementById('governorateId');
            select.innerHTML = '<option value="">اختر المحافظة</option>' +
                res.data.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        } catch (err) {}
    }

    async function updateProfile(btn) {
        UI.showLoading(btn);
        try {
            await API.auth.updateProfile({
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                governorateId: parseInt(document.getElementById('governorateId').value),
                area: document.getElementById('area').value
            });

            UI.showToast('تم تحديث بياناتك بنجاح');
            await loadProfile();
        } catch (err) {
            UI.showToast(err.message, 'error');
        } finally {
            UI.hideLoading(btn);
        }
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المواعيد - لوحة التحكم</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar">
    <a href="../index.html" class="navbar-brand">
        <i class="bi bi-building-fill"></i>
        السجل المدني - لوحة التحكم
    </a>
    <ul class="navbar-nav">
        <li><a href="dashboard.html" class="nav-link">الرئيسية</a></li>
        <li><a href="appointments.html" class="nav-link active">المواعيد</a></li>
        <li><a href="branches.html" class="nav-link">الفروع</a></li>
        <li><a href="services.html" class="nav-link">الخدمات</a></li>
        <li><a href="complaints.html" class="nav-link">الشكاوى</a></li>
        <li><a href="users.html" class="nav-link">المستخدمين</a></li>
        <li>
            <button class="btn btn-outline" onclick="logout()"
                style="color:white;border-color:rgba(255,255,255,0.6)">
                <i class="bi bi-box-arrow-right"></i>
                خروج
            </button>
        </li>
    </ul>
</nav>

<div class="sidebar">
    <a href="dashboard.html" class="sidebar-link">
        <i class="bi bi-speedometer2"></i> الرئيسية
    </a>
    <a href="appointments.html" class="sidebar-link active">
        <i class="bi bi-calendar-check"></i> المواعيد
    </a>
    <a href="branches.html" class="sidebar-link">
        <i class="bi bi-building"></i> الفروع
    </a>
    <a href="services.html" class="sidebar-link">
        <i class="bi bi-list-check"></i> الخدمات
    </a>
    <a href="complaints.html" class="sidebar-link">
        <i class="bi bi-exclamation-circle"></i> الشكاوى
    </a>
    <a href="users.html" class="sidebar-link">
        <i class="bi bi-people"></i> المستخدمين
    </a>
</div>

<div class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <h2 style="font-size:1.4rem;font-weight:900;color:var(--primary)">إدارة المواعيد</h2>
        <div style="display:flex;gap:12px;align-items:center">
            <input type="date" class="form-control" id="datePicker"
                style="width:auto" onchange="loadAppointments()">
            <select class="form-control" id="branchFilter"
                style="width:auto" onchange="loadAppointments()">
                <option value="">كل الفروع</option>
            </select>
            <a id="reportBtn" class="btn btn-primary" target="_blank">
                <i class="bi bi-file-pdf"></i>
                PDF
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body" style="padding:0">
            <div id="appointmentsContainer">
                <div class="empty-state">
                    <div class="spinner" style="border-color:var(--border);border-top-color:var(--primary);width:30px;height:30px;margin:0 auto"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    async function init() {
        UI.redirectIfNotAdmin();

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
        document.getElementById('datePicker').max = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000)
            .toISOString().split('T')[0];

        await loadBranches();
        await loadAppointments();
    }

    async function loadBranches() {
        try {
            const res = await API.admin.getBranches();
            const select = document.getElementById('branchFilter');
            select.innerHTML = '<option value="">كل الفروع</option>' +
                res.data.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        } catch (err) {}
    }

    async function loadAppointments() {
        const date = document.getElementById('datePicker').value;
        const branchId = document.getElementById('branchFilter').value;
        const container = document.getElementById('appointmentsContainer');

        // Update report link
        document.getElementById('reportBtn').href = API.admin.getDailyReport(date, branchId || null);

        container.innerHTML = '<div style="padding:30px;text-align:center"><div class="spinner" style="border-color:var(--border);border-top-color:var(--primary);width:30px;height:30px;margin:0 auto"></div></div>';

        try {
            const res = await API.admin.getAppointments(date, branchId || null);
            const appointments = res.data || [];

            if (!appointments.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-calendar-x" style="font-size:3rem;color:var(--text-muted)"></i>
                        <p>لا توجد مواعيد في هذا اليوم</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المواطن</th>
                            <th>الخدمة</th>
                            <th>الفرع</th>
                            <th>الوقت</th>
                            <th>الحالة</th>
                            <th>تغيير الحالة</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${appointments.map(a => `
                            <tr>
                                <td style="color:var(--text-muted)">#${a.id}</td>
                                <td>
                                    <div style="font-weight:700">${a.userFullName}</div>
                                    <div style="font-size:0.8rem;color:var(--text-muted)">${a.userPhone}</div>
                                </td>
                                <td>${a.serviceName}</td>
                                <td>${a.branchName}</td>
                                <td style="font-weight:700">${UI.formatTime(a.timeSlot)}</td>
                                <td>${UI.getStatusBadge(a.status)}</td>
                                <td>
                                    <div style="display:flex;gap:6px">
                                        ${a.status === 'Pending' || a.status === 'Confirmed' ? `
                                            <button class="btn btn-sm btn-success"
                                                onclick="updateStatus(${a.id}, 2, this)">
                                                <i class="bi bi-check"></i> مكتمل
                                            </button>
                                            <button class="btn btn-sm btn-danger"
                                                onclick="updateStatus(${a.id}, 3, this)">
                                                <i class="bi bi-x"></i> إلغاء
                                            </button>
                                        ` : ''}
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (err) {
            UI.showToast('حدث خطأ في تحميل المواعيد', 'error');
        }
    }

    async function updateStatus(id, status, btn) {
        UI.showLoading(btn);
        try {
            await API.admin.updateAppointmentStatus(id, status);
            UI.showToast('تم تحديث حالة الموعد');
            await loadAppointments();
        } catch (err) {
            UI.showToast(err.message, 'error');
        } finally {
            UI.hideLoading(btn);
        }
    }

    function logout() {
        Auth.clearSession();
        window.location.href = '../index.html';
    }

    init();
</script>
</body>
</html>
